    const Download = (p) => <Svg {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></Svg>;

    const Clock = (p) => <Svg {...p}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></Svg>;
    const FileText = (p) => <Svg {...p}><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><polyline points="14 2 14 8 20 8"/></Svg>;
    const Settings = (p) => <Svg {...p}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></Svg>;
    const Sun = (p) => <Svg {...p}><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></Svg>;

    const Wave = (p) => <Svg {...p}><path d="M2 6c.6-.5 1.2-1 2.5-1 2.5 0 2.5 2 5 2 2.6 0 2.4-2 5-2 2.5 0 2.5 2 5 2 1.3 0 1.9-.5 2.5-1"/><path d="M2 12c.6-.5 1.2-1 2.5-1 2.5 0 2.5 2 5 2 2.6 0 2.4-2 5-2 2.5 0 2.5 2 5 2 1.3 0 1.9-.5 2.5-1"/><path d="M2 18c.6-.5 1.2-1 2.5-1 2.5 0 2.5 2 5 2 2.6 0 2.4-2 5-2 2.5 0 2.5 2 5 2 1.3 0 1.9-.5 2.5-1"/></Svg>;
    const Info = (p) => <Svg {...p}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></Svg>;
    const Edit3 = (p) => <Svg {...p}><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 1 1 3 3L7 19l-4 1 1-4Z"/></Svg>;
    const MapPin = (p) => <Svg {...p}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></Svg>;
    const ImageIcon = (p) => <Svg {...p}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></Svg>;

    // === CONSTANTS ===
    const DEFAULT_ITEMS = [
      { name: 'T-Shirts', emoji: '👕' },
      { name: 'Bags', emoji: '🛍️' }
    ];
    const BMC_URL = 'https://buymeacoffee.com/Domo326';
    const CONGRATS = [
      "🎉 Great job out there! Safe travels on your next adventure!",
      "🌟 What a tour! You crushed it. Onwards to the next one!",
      "🚀 Look at those numbers! Take a breather, you earned it.",
      "👏 Tour complete! May your next one be even better.",
      "🏆 Champion behavior. Have fun on the road ahead!"
    ];

    function getFunFact(stats) {
      const facts = [];
      const total = stats.totalGivenOut;
      const days = stats.days;
      const cities = stats.cities;
      const events = stats.events;

      if (total > 0) {
        facts.push(`📦 If each item weighed 1 lb, you moved ${total.toLocaleString()} lbs of swag — about the weight of ${Math.max(1, Math.round(total/180)).toLocaleString()} grown adults.`);
        facts.push(`🎁 You handed out more freebies than your average Black Friday Best Buy line.`);
        facts.push(`🤯 ${total.toLocaleString()} items! At 5 seconds each, that's ${Math.round(total*5/3600).toLocaleString()}+ hours of pure giveaway energy.`);
        facts.push(`🛒 Enough swag to fill ~${Math.max(1, Math.round(total/200)).toLocaleString()} shopping carts. The Costco moms would be jealous.`);
        if (days > 0) facts.push(`⚡ That's ~${Math.round(total/days).toLocaleString()} items per day. Santa Claus is taking notes.`);
        const pallets = Math.max(1, Math.round(total/500));
        facts.push(`🚚 Stacked on pallets, that's roughly ${pallets} pallet${pallets !== 1 ? 's' : ''} of stuff. Your truck earned its rent.`);
        facts.push(`🌮 ${total.toLocaleString()} items is about the same as how many tacos a small town eats in a week. Just saying.`);
      }
      if (cities > 1) {
        facts.push(`🗺️ ${cities} cities visited — you're basically a rock band at this point. 🎸`);
        facts.push(`✈️ ${cities} cities! That's more places than the average American visits in an entire year.`);
        facts.push(`🚗 An average person would need a serious road trip to hit all ${cities} of these cities. You did it for work.`);
        facts.push(`📍 ${cities} cities means ${cities} different "where's the nearest Chipotle?" moments. We salute you.`);
      }
      if (events > 2) {
        facts.push(`📁 ${events} events. Each one had its own vibe and you handled them all. Pro move. 🏅`);
      }
      if (days > 7) {
        facts.push(`📅 ${days} days on the road — that's ${Math.round(days/7)} weekends sacrificed for the tour. 🫡`);
        facts.push(`☕ ${days} working days = roughly ${days*2} coffees consumed. You're personally funding a barista's vacation.`);
        facts.push(`🛏️ ${days} hotel nights of "why is the WiFi password 'welcome' but also nothing works?"`);
        facts.push(`📶 ${days} days of testing every gas station's bathroom on the way. Heroic, honestly.`);
      }
      facts.push(`🎯 Mission accomplished. The brand should send you a thank-you card.`);
      facts.push(`🏅 Tour managers are the unsung heroes of marketing. This one's for you.`);
      facts.push(`🚌 Your truck has stories now. Don't let it forget you.`);
      facts.push(`🎬 That's a wrap. Hollywood-level execution.`);
      facts.push(`🔥 You're the reason this whole marketing budget actually did something cool.`);

      return facts[Math.floor(Math.random() * facts.length)];
    }

    // Smart emoji matching
    const EMOJI_MAP = {
      bag: '🛍️', bags: '🛍️', tote: '🛍️', totes: '🛍️',
      bottle: '💧', bottles: '💧', water: '💧',
      fan: '🪭', fans: '🪭',
      shirt: '👕', shirts: '👕', tshirt: '👕', tshirts: '👕', 't-shirt': '👕', 't-shirts': '👕', tee: '👕', tees: '👕',
      hat: '🎩', hats: '🎩', cap: '🧢', caps: '🧢',
      sticker: '🏷️', stickers: '🏷️',
      sample: '📦', samples: '📦',
      pen: '🖊️', pens: '🖊️',
      keychain: '🔑', keychains: '🔑',
      lanyard: '🪢', lanyards: '🪢',
      'cooling towel': '❄️', 'cooling towels': '❄️', towel: '🧻', towels: '🧻',
      funko: '🎎', 'funko pop': '🎎', 'funko pops': '🎎',
      koozie: '🥤', koozies: '🥤', cup: '🥤', cups: '🥤', mug: '☕', mugs: '☕',
      poster: '🖼️', posters: '🖼️',
      flag: '🚩', flags: '🚩',
      bracelet: '📿', bracelets: '📿', wristband: '⌚', wristbands: '⌚',
      backpack: '🎒', backpacks: '🎒',
      notebook: '📓', notebooks: '📓',
      button: '🔘', buttons: '🔘', pin: '📌', pins: '📌',
      snack: '🍿', snacks: '🍿', candy: '🍬',
      card: '🃏', cards: '🃏',
      ball: '⚽', balls: '⚽',
      toy: '🧸', toys: '🧸',
      phone: '📱', tablet: '📱', tablets: '📱',
      magnet: '🧲', magnets: '🧲',
      hoodie: '🧥', hoodies: '🧥',
      sock: '🧦', socks: '🧦',
      umbrella: '☂️', sunglasses: '🕶️',
      charger: '🔌', chargers: '🔌', cable: '🔌', cables: '🔌'
    };
    function smartEmoji(name) {
      if (!name) return '📦';
      const lower = name.toLowerCase().trim();
      if (EMOJI_MAP[lower]) return EMOJI_MAP[lower];
      for (const [key, emoji] of Object.entries(EMOJI_MAP)) {
        if (lower.includes(key)) return emoji;
      }
      return '📦';
    }

    // === HELPERS ===
    const todayISO = () => new Date().toISOString().slice(0, 10);
    const timeShort = (iso) => { try { return new Date(iso).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' }); } catch { return ''; }};
    const dateNice = (iso) => { try { return new Date(iso + 'T12:00:00').toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' }); } catch { return iso; }};
    const dateShort = (iso) => { try { return new Date(iso + 'T12:00:00').toLocaleDateString([], { month: 'short', day: 'numeric' }); } catch { return iso; }};
    const monthYearShort = (iso) => {
      if (!iso || typeof iso !== 'string') return null;
      try {
        const [y, m] = iso.split('-');
        if (!y || !m) return null;
        const d = new Date(parseInt(y), parseInt(m) - 1, 1);
        if (isNaN(d.getTime())) return null;
        return `${d.toLocaleDateString([], { month: 'short' })}/${y.slice(2)}`;
      } catch { return null; }
    };
    const newId = (p='d') => `${p}_${Date.now()}_${Math.random().toString(36).slice(2,7)}`;

    async function sget(key, fb) { try { const v = localStorage.getItem('tracker:' + key); if (v === null) return fb; return JSON.parse(v); } catch { return fb; }}
    async function sset(key, v) { try { localStorage.setItem('tracker:' + key, JSON.stringify(v)); } catch (e) { console.error(e); }}
    async function sdel(key) { try { localStorage.removeItem('tracker:' + key); } catch {} }

    function findItem(library, name) { return library.find(i => i.name === name); }
    function getEmoji(library, name) { return findItem(library, name)?.emoji || smartEmoji(name); }

    // === MIGRATION ===
    async function migrate() {
      // 1. Items library: string[] -> {name, emoji}[] (legacy safety)
      const items = await sget('items', null);
      if (items && items.length > 0 && typeof items[0] === 'string') {
        const upgraded = items.map(name => ({ name, emoji: smartEmoji(name) }));
        await sset('items', upgraded);
      }
      // 2. Ensure events array exists
      const events = await sget('events', null);
      if (!events) {
        await sset('events', []);
      }
    }

    // === THEME CTX ===
    const ThemeCtx = createContext({ theme: 'dark', toggle: () => {} });
    const useTheme = () => useContext(ThemeCtx);
    function ThemeToggle() {
      const { theme, toggle } = useTheme();
      // Show icon of NEXT theme. Cycle: light → dark → ocean → light
      let icon, label;
      if (theme === 'light') { icon = <Moon className="w-4 h-4 text-3" />; label = 'Switch to dark'; }
      else if (theme === 'dark') { icon = <Wave className="w-4 h-4 text-3" />; label = 'Switch to ocean'; }
      else { icon = <Sun className="w-4 h-4 text-3" />; label = 'Switch to light'; }
      return (
        <button onClick={toggle} className="p-2 rounded-lg bg-surface border border-line active:scale-95" aria-label={label}>
          {icon}
        </button>
      );
    }
    function InfoButton({ onClick }) {
      return (
        <button onClick={onClick} className="p-2 rounded-lg bg-surface border border-line active:scale-95" aria-label="Info">
          <Info className="w-4 h-4 text-3" />
        </button>
      );
    }

    // === APP ===
    function App() {
      const [screen, setScreen] = useState('home');
      const [currentEventId, setCurrentEventId] = useState(null);
      const [currentDayId, setCurrentDayId] = useState(null);
      const [events, setEvents] = useState([]);
      const [daysIndex, setDaysIndex] = useState([]);
      const [currentDay, setCurrentDay] = useState(null);
      const [itemsLibrary, setItemsLibrary] = useState([]);
      const [theme, setTheme] = useState('dark');
      const [showWelcome, setShowWelcome] = useState(false);
      const [showInfo, setShowInfo] = useState(false);
      const [loading, setLoading] = useState(true);
      const [toast, setToast] = useState(null);

      useEffect(() => { (async () => {
        await migrate();
        let items = await sget('items', null);
        if (!items) { items = DEFAULT_ITEMS; await sset('items', items); }
        setItemsLibrary(items);
        const ev = await sget('events', []);
        const idx = await sget('idx', []);
        setEvents(ev);
        setDaysIndex(idx);
        const savedTheme = await sget('theme', 'dark');
        setTheme(savedTheme);
        const w = await sget('welcomed', null);
        // Existing users: mark as welcomed silently. New users: show welcome.
        if (w === null) {
          if (ev.length > 0 || idx.length > 0) {
            await sset('welcomed', true);
          } else {
            setShowWelcome(true);
          }
        }
        setLoading(false);
      })(); }, []);

      const toggleTheme = async () => {
        const order = ['light', 'dark', 'ocean'];
        const next = order[(order.indexOf(theme) + 1) % order.length];
        setTheme(next);
        await sset('theme', next);
      };

      const showToast = (m) => { setToast(m); setTimeout(() => setToast(null), 2000); };

      const createEvent = async (name, city, monthYear) => {
        const ev = { id: newId('e'), name: name.trim() || 'Untitled', city: city?.trim() || null, monthYear: monthYear || null, createdAt: new Date().toISOString() };
        const next = [ev, ...events];
        setEvents(next);
        await sset('events', next);
        setCurrentEventId(ev.id);
        setScreen('event');
        showToast(`📁 ${ev.name} created`);
      };
      const renameEvent = async (id, name, city, monthYear) => {
        const next = events.map(e => e.id === id ? { ...e, name: name.trim() || e.name, city: city?.trim() || null, monthYear: monthYear || null } : e);
        setEvents(next);
        await sset('events', next);
        const ev = next.find(e => e.id === id);
        const newIdx = daysIndex.map(d => d.eventId === id ? { ...d, eventName: ev.name } : d);
        setDaysIndex(newIdx);
        await sset('idx', newIdx);
      };
      const deleteEvent = async (id) => {
        const daysToDelete = daysIndex.filter(d => d.eventId === id);
        for (const d of daysToDelete) await sdel(`d:${d.id}`);
        const newIdx = daysIndex.filter(d => d.eventId !== id);
        const next = events.filter(e => e.id !== id);
        setEvents(next); setDaysIndex(newIdx);
        await sset('events', next);
        await sset('idx', newIdx);
        setScreen('home');
        setCurrentEventId(null);
        showToast('🗑️ Event deleted');
      };
      const openEvent = (id) => { setCurrentEventId(id); setScreen('event'); };

      const openDay = async (id) => {
        const d = await sget(`d:${id}`, null);
        if (d) { setCurrentDay(d); setCurrentDayId(id); setScreen('day'); }
      };

      const createDay = async (eventId) => {
        const ev = events.find(e => e.id === eventId);
        const eventDays = daysIndex.filter(d => d.eventId === eventId);
        const lastInEvent = eventDays[0];
        const id = newId('d');
        const startingItems = lastInEvent
          ? (lastInEvent.activeItems || itemsLibrary.slice(0, 2).map(i => i.name))
          : itemsLibrary.slice(0, 2).map(i => i.name);
        const day = {
          id, eventId,
          eventName: ev?.name || '',
          weekNum: lastInEvent?.weekNum || 1,
          dayNum: lastInEvent ? lastInEvent.dayNum + 1 : 1,
          date: todayISO(),
          status: 'active',
          createdAt: new Date().toISOString(),
          closedAt: null,
          activeItems: startingItems,
          inventory: {}
        };
        day.activeItems.forEach(n => { day.inventory[n] = { starting: 0, restocks: [], leftover: null }; });
        await sset(`d:${id}`, day);
        const idxEntry = { id, eventId, eventName: day.eventName, weekNum: day.weekNum, dayNum: day.dayNum, date: day.date, status: 'active', dayTotal: 0, activeItems: day.activeItems };
        const newIdx = [idxEntry, ...daysIndex];
        await sset('idx', newIdx);
        setDaysIndex(newIdx); setCurrentDay(day); setCurrentDayId(id); setScreen('day');
      };

      const saveDay = async (updated) => {
        setCurrentDay(updated);
        await sset(`d:${updated.id}`, updated);
        const dayTotal = Object.values(updated.inventory).reduce((s, v) => {
          const start = (v.starting || 0) + (v.restocks || []).reduce((a,r) => a + (r.amount||0), 0);
          if (v.leftover === null || v.leftover === undefined) return s;
          return s + Math.max(0, start - v.leftover);
        }, 0);
        const newIdx = daysIndex.map(d => d.id === updated.id
          ? { ...d, eventId: updated.eventId, eventName: updated.eventName, weekNum: updated.weekNum, dayNum: updated.dayNum, date: updated.date, status: updated.status, dayTotal, activeItems: updated.activeItems }
          : d);
        await sset('idx', newIdx);
        setDaysIndex(newIdx);
      };

      const deleteDay = async (id) => {
        await sdel(`d:${id}`);
        const newIdx = daysIndex.filter(d => d.id !== id);
        await sset('idx', newIdx);
        setDaysIndex(newIdx);
        if (currentDayId === id) {
          setCurrentDay(null); setCurrentDayId(null);
          setScreen(currentEventId ? 'event' : 'home');
        }
        showToast('🗑️ Day deleted');
      };

      const reorderDay = async (dayId, direction) => {
        const idx = daysIndex.findIndex(d => d.id === dayId);
        if (idx === -1) return;
        const eventId = daysIndex[idx].eventId;
        const myEventDays = daysIndex.filter(d => d.eventId === eventId);
        const myPos = myEventDays.findIndex(d => d.id === dayId);
        const swapPos = direction === 'up' ? myPos - 1 : myPos + 1;
        if (swapPos < 0 || swapPos >= myEventDays.length) return;
        const swapId = myEventDays[swapPos].id;
        const swapGlobalIdx = daysIndex.findIndex(d => d.id === swapId);
        const newIdx = [...daysIndex];
        [newIdx[idx], newIdx[swapGlobalIdx]] = [newIdx[swapGlobalIdx], newIdx[idx]];
        await sset('idx', newIdx);
        setDaysIndex(newIdx);
      };

      const updateLibrary = async (next) => { setItemsLibrary(next); await sset('items', next); };

      const exportData = async () => {
        const days = {};
        for (const di of daysIndex) {
          const day = await sget(`d:${di.id}`, null);
          if (day) days[di.id] = day;
        }
        return {
          version: 1,
          app: 'tracker',
          exportedAt: new Date().toISOString(),
          events,
          daysIndex,
          itemsLibrary,
          days
        };
      };

      const importData = async (incoming, mode) => {
        if (mode === 'replace') {
          const keys = Object.keys(localStorage).filter(k => k.startsWith('tracker:d:') || k === 'tracker:events' || k === 'tracker:idx' || k === 'tracker:items');
          keys.forEach(k => localStorage.removeItem(k));
          const newEvents = incoming.events || [];
          const newIdx = incoming.daysIndex || [];
          const newItems = incoming.itemsLibrary || DEFAULT_ITEMS;
          await sset('events', newEvents);
          await sset('idx', newIdx);
          await sset('items', newItems);
          for (const [id, day] of Object.entries(incoming.days || {})) {
            await sset(`d:${id}`, day);
          }
          setEvents(newEvents); setDaysIndex(newIdx); setItemsLibrary(newItems);
          setCurrentDay(null); setCurrentDayId(null); setCurrentEventId(null);
          setScreen('home');
        } else if (mode === 'merge') {
          const existingEventIds = new Set(events.map(e => e.id));
          const newEvents = [...events, ...((incoming.events || []).filter(e => !existingEventIds.has(e.id)))];
          const existingDayIds = new Set(daysIndex.map(d => d.id));
          const newIdx = [...daysIndex, ...((incoming.daysIndex || []).filter(d => !existingDayIds.has(d.id)))];
          for (const [id, day] of Object.entries(incoming.days || {})) {
            if (!existingDayIds.has(id)) await sset(`d:${id}`, day);
          }
          const existingItemNames = new Set(itemsLibrary.map(i => i.name.toLowerCase()));
          const newItems = [...itemsLibrary, ...((incoming.itemsLibrary || []).filter(i => !existingItemNames.has(i.name.toLowerCase())))];
          await sset('events', newEvents);
          await sset('idx', newIdx);
          await sset('items', newItems);
          setEvents(newEvents); setDaysIndex(newIdx); setItemsLibrary(newItems);
        }
      };

      const startNewTour = async () => {
        const keys = Object.keys(localStorage).filter(k => k.startsWith('tracker:') && (k.startsWith('tracker:d:') || k === 'tracker:events' || k === 'tracker:idx'));
        keys.forEach(k => localStorage.removeItem(k));
        setEvents([]); setDaysIndex([]); setCurrentDay(null); setCurrentDayId(null); setCurrentEventId(null);
        await sset('items', DEFAULT_ITEMS);
        setItemsLibrary(DEFAULT_ITEMS);
        setScreen('home');
        showToast('🧹 Fresh start — good luck!');
      };

      const dismissWelcome = async (dontShow) => {
        setShowWelcome(false);
        if (dontShow) { await sset('welcomed', true); }
      };

      if (loading) {
        return (
          <div className={`theme-${theme} min-h-screen w-full flex items-center justify-center bg-app`}>
            <div className="text-3 font-data text-xs tracking-widest uppercase">Loading</div>
          </div>
        );
      }

      const currentEvent = events.find(e => e.id === currentEventId);
      const eventDays = daysIndex.filter(d => d.eventId === currentEventId);

      return (
        <ThemeCtx.Provider value={{ theme, toggle: toggleTheme }}>
          <div className={`theme-${theme} min-h-screen w-full bg-app text-1 font-body`}>
            <div className="md:flex md:h-screen">
              {/* Sidebar — wide screens only (foldables unfolded, tablets, desktop) */}
              <aside className="hidden md:flex md:flex-col md:w-72 lg:w-80 md:shrink-0 md:h-screen md:border-r md:border-line bg-surface-2">
                <EventsSidebar
                  events={events}
                  daysIndex={daysIndex}
                  currentEventId={currentEventId}
                  onOpenEvent={openEvent}
                  onCreateEvent={createEvent}
                  onLibrary={() => setScreen('library')}
                  onInfo={() => setShowInfo(true)}
                  onHome={() => { setScreen('home'); setCurrentEventId(null); setCurrentDay(null); setCurrentDayId(null); }}
                />
              </aside>

              {/* Main pane */}
              <main className="md:flex-1 md:h-screen md:overflow-y-auto">
                {screen === 'home' && (
                  <>
                    <div className="md:hidden">
                      <Home events={events} daysIndex={daysIndex} onOpenEvent={openEvent} onCreateEvent={createEvent} onLibrary={() => setScreen('library')} onInfo={() => setShowInfo(true)} onDeleteEvent={deleteEvent} onRenameEvent={renameEvent} />
                    </div>
                    <div className="hidden md:block">
                      <WidePlaceholder />
                    </div>
                  </>
                )}
                {screen === 'event' && currentEvent && (
                  <EventDetail event={currentEvent} eventDays={eventDays} onBack={() => { setScreen('home'); setCurrentEventId(null); }} onOpenDay={openDay} onCreateDay={() => createDay(currentEventId)} onDeleteDay={deleteDay} onReorderDay={reorderDay} onRenameEvent={(name, city, monthYear) => renameEvent(currentEventId, name, city, monthYear)} onDeleteEvent={() => deleteEvent(currentEventId)} onInfo={() => setShowInfo(true)} />
                )}
                {screen === 'day' && currentDay && (
                  <DayDetail day={currentDay} event={events.find(e => e.id === currentDay.eventId)} itemsLibrary={itemsLibrary} onSave={saveDay} onBack={() => { setScreen('event'); setCurrentDay(null); }} onExport={() => setScreen('export')} onInfo={() => setShowInfo(true)} showToast={showToast} />
                )}
                {screen === 'library' && (
                  <Library items={itemsLibrary} onChange={updateLibrary} onBack={() => setScreen('home')} onEndTour={() => setScreen('summary')} onInfo={() => setShowInfo(true)} showToast={showToast} hasData={events.length > 0 || daysIndex.length > 0} onExport={exportData} onImport={importData} />
                )}
                {screen === 'summary' && (
                  <TourSummary events={events} daysIndex={daysIndex} itemsLibrary={itemsLibrary} theme={theme} onBack={() => setScreen('library')} onStartNewTour={startNewTour} onInfo={() => setShowInfo(true)} showToast={showToast} />
                )}
                {screen === 'export' && currentDay && (
                  <ExportView day={currentDay} itemsLibrary={itemsLibrary} onBack={() => setScreen('day')} onInfo={() => setShowInfo(true)} showToast={showToast} />
                )}
              </main>
            </div>

            {showWelcome && <InfoModal first onClose={dismissWelcome} />}
            {showInfo && <InfoModal onClose={() => setShowInfo(false)} />}

            {toast && (
              <div className="fixed bottom-6 left-1/2 -translate-x-1/2 px-3.5 py-2 bg-inverse rounded-full text-xs font-semibold shadow-lg z-50">
                {toast}
              </div>
            )}
          </div>
        </ThemeCtx.Provider>
      );
    }

    // === INFO MODAL ===
    function InfoModal({ first, onClose }) {
      const [dontShow, setDontShow] = useState(false);
      const close = () => first ? onClose(dontShow) : onClose();
      return (
        <Modal onClose={close}>
          <div className="text-center mb-3">
            <div className="text-4xl mb-1">👋</div>
            <h2 className="font-display text-xl font-extrabold text-1">{first ? 'Welcome to Premium Tracker!' : 'Premium Tracker'}</h2>
            <p className="text-3 text-xs mt-1">Your tour management sidekick 🚌</p>
          </div>
          <div className="space-y-1.5 text-xs mb-3 text-2">
            <InfoLine emoji="📁" t="Events" body="are folders. Each event holds your tour days." />
            <InfoLine emoji="📅" t="New Day" body="inside an event tracks that day's inventory." />
            <InfoLine emoji="🔄" t="Restocks" body="logged with timestamps as the day goes." />
            <InfoLine emoji="🔢" t="Leftover" body="end of day → auto-calcs Given Out." />
            <InfoLine emoji="🔒" t="Close Out" body="locks the day. Reopen anytime." />
            <InfoLine emoji="📤" t="Export" body="recap to share with your team." />
            <InfoLine emoji="🏆" t="End Tour" body="(in Settings ⚙️) → beautiful summary you can share!" />
          </div>
          <p className="text-[11px] text-3 text-center mb-3">
            ✨ Tap the <b className="text-1">ⓘ</b> button anytime to see this again.
          </p>
          {first && (
            <label className="flex items-center gap-2 text-xs text-2 mb-3 cursor-pointer select-none">
              <input type="checkbox" checked={dontShow} onChange={e => setDontShow(e.target.checked)} className="w-4 h-4" />
              <span>Don't show this again</span>
            </label>
          )}
          <a href={BMC_URL} target="_blank" rel="noopener noreferrer" className="block text-center text-xs text-3 mb-3 py-2 rounded-md bg-surface-2 border border-line hover:text-accent active:scale-[0.99] transition">
            ☕ Enjoying the app? <b className="underline">Buy me a coffee →</b>
          </a>
          <button onClick={close} className="w-full bg-inverse font-bold py-2.5 rounded-md text-sm flex items-center justify-center gap-1.5">
            Got it 👍
          </button>
        </Modal>
      );
    }
    function InfoLine({ emoji, t, body }) {
      return (
        <div className="flex items-start gap-2">
          <span className="shrink-0">{emoji}</span>
          <span><b className="text-1">{t}</b> {body}</span>
        </div>
      );
    }

    // === EVENTS SIDEBAR (foldable / wide screens only) ===
    function EventsSidebar({ events, daysIndex, currentEventId, onOpenEvent, onCreateEvent, onLibrary, onInfo, onHome }) {
      const [showCreate, setShowCreate] = useState(false);
      const activeEvents = events.filter(e => daysIndex.some(d => d.eventId === e.id && d.status === 'active')).length;
      const totalDays = daysIndex.length;
      return (
        <div className="flex flex-col h-full">
          <div className="px-4 pt-5 pb-3 border-b border-line shrink-0">
            <button onClick={onHome} className="text-left mb-3 active:opacity-60 block w-full">
              <div className="text-[10px] font-data uppercase tracking-[0.25em] text-accent font-bold flex items-center gap-1">🎁 Tour Inventory</div>
              <h1 className="font-display text-2xl font-extrabold leading-tight text-1 flex items-center gap-1.5">Premium<span className="text-accent">.</span></h1>
            </button>
            <div className="flex items-center gap-2 text-xs font-data mb-3 flex-wrap">
              <span><span className="text-4">Events</span> <b className="text-1">{events.length}</b></span>
              <span className="text-5">·</span>
              <span><span className="text-4">Active</span> <b className="text-accent">{activeEvents}</b></span>
              <span className="text-5">·</span>
              <span><span className="text-4">Days</span> <b className="text-amber">{totalDays}</b></span>
            </div>
            <div className="flex gap-1.5 mb-2">
              <InfoButton onClick={onInfo} />
              <ThemeToggle />
              <button onClick={onLibrary} className="flex-1 p-2 rounded-lg bg-surface border border-line active:scale-95 text-xs font-semibold text-2 flex items-center justify-center gap-1.5">
                <Settings className="w-3.5 h-3.5" /> Settings
              </button>
            </div>
            <button onClick={() => setShowCreate(true)} className="w-full bg-inverse font-bold py-2.5 rounded-lg flex items-center justify-center gap-1.5 active:scale-[0.98]">
              <Plus className="w-3.5 h-3.5" strokeWidth={3} />
              <span className="font-display text-sm">New Event</span>
            </button>
          </div>
          <div className="flex-1 overflow-y-auto px-2 py-2">
            {events.length === 0 ? (
              <div className="text-center py-10 px-3">
                <div className="text-3xl mb-2">📁</div>
                <p className="text-xs text-3">Tap <b className="text-accent">New Event</b> to start</p>
              </div>
            ) : (
              <div className="space-y-1">
                {events.map(ev => (
                  <SidebarEventItem key={ev.id} event={ev} daysIndex={daysIndex} selected={ev.id === currentEventId} onClick={() => onOpenEvent(ev.id)} />
                ))}
              </div>
            )}
          </div>
          {showCreate && (
            <EventEditModal title="New Event" onClose={() => setShowCreate(false)} onSave={(n, c, m) => { onCreateEvent(n, c, m); setShowCreate(false); }} />
          )}
        </div>
      );
    }

    function SidebarEventItem({ event, daysIndex, selected, onClick }) {
      const myDays = daysIndex.filter(d => d.eventId === event.id);
      const activeDays = myDays.filter(d => d.status === 'active').length;
      return (
        <button onClick={onClick} className={`w-full text-left px-2.5 py-2 rounded-lg transition active:scale-[0.99] ${selected ? 'bg-accent-soft border border-accent' : 'border border-transparent hover:bg-surface'}`}>
          <div className="flex items-center gap-2 min-w-0">
            <span className="text-base shrink-0">📁</span>
            <div className="flex-1 min-w-0">
              <div className="flex items-center gap-1.5 min-w-0">
                <span className="font-display font-bold text-sm truncate text-1">{event.name}</span>
                {event.monthYear && (
                  <span className="text-[9px] font-data font-bold text-3 px-1 py-0.5 rounded bg-surface-2 border border-line shrink-0">{monthYearShort(event.monthYear)}</span>
                )}
              </div>
              <div className="flex items-center gap-1.5 mt-0.5 text-[10px] font-data text-3 min-w-0">
                {event.city && <span className="truncate">📍 {event.city}</span>}
                {event.city && <span className="text-5 shrink-0">·</span>}
                <span className="shrink-0">{myDays.length} day{myDays.length !== 1 ? 's' : ''}</span>
                {activeDays > 0 && <span className="text-accent shrink-0">· {activeDays} live</span>}
              </div>
            </div>
          </div>
        </button>
      );
    }

    // === Wide-screen placeholder (shown when no event selected on tablets/foldables) ===
    function WidePlaceholder() {
      return (
        <div className="h-full min-h-[60vh] flex items-center justify-center p-8">
          <div className="text-center max-w-sm">
            <div className="text-6xl mb-4">📁</div>
            <h2 className="font-display text-2xl font-extrabold text-1 mb-2">Pick an event</h2>
            <p className="text-3 text-sm">Tap any event in the sidebar to start tracking, or create a new one.</p>
          </div>
        </div>
      );
    }

    // === HOME (events list) ===
    function Home({ events, daysIndex, onOpenEvent, onCreateEvent, onLibrary, onInfo, onDeleteEvent, onRenameEvent }) {
      const [showCreate, setShowCreate] = useState(false);
      const [editingEvent, setEditingEvent] = useState(null);
      const activeEvents = events.filter(e => daysIndex.some(d => d.eventId === e.id && d.status === 'active')).length;
      const totalDays = daysIndex.length;

      return (
        <div className="max-w-2xl mx-auto px-4 pt-5 pb-32">
          <div className="flex items-center justify-between mb-4">
            <div>
              <div className="text-[10px] font-data uppercase tracking-[0.25em] text-accent font-bold flex items-center gap-1">🎁 Tour Inventory</div>
              <h1 className="font-display text-2xl font-extrabold leading-tight text-1 flex items-center gap-1.5">Premium<span className="text-accent">.</span></h1>
            </div>
            <div className="flex items-center gap-1.5">
              <InfoButton onClick={onInfo} />
              <ThemeToggle />
              <button onClick={onLibrary} className="p-2 rounded-lg bg-surface border border-line active:scale-95" aria-label="Settings">
                <Settings className="w-4 h-4 text-3" />
              </button>
            </div>
          </div>

          <div className="flex items-center gap-3 text-xs font-data mb-4 px-1">
            <span><span className="text-4">Events</span> <b className="text-1">{events.length}</b></span>
            <span className="text-5">·</span>
            <span><span className="text-4">Active</span> <b className="text-accent">{activeEvents}</b></span>
            <span className="text-5">·</span>
            <span><span className="text-4">Days</span> <b className="text-amber">{totalDays}</b></span>
          </div>

          <button onClick={() => setShowCreate(true)} className="w-full mb-4 bg-inverse font-bold py-3 rounded-xl flex items-center justify-center gap-1.5 active:scale-[0.98]">
            <Plus className="w-4 h-4" strokeWidth={3} />
            <span className="font-display text-base">New Event</span>
          </button>

          {events.length === 0 ? (
            <div className="text-center py-12 border border-dashed border-line rounded-xl">
              <div className="text-3xl mb-1">📁</div>
              <p className="text-sm text-3">Tap <b className="text-accent">New Event</b> to start your tour</p>
              <p className="text-xs text-4 mt-2">e.g. "LA County Fair"</p>
            </div>
          ) : (
            <div className="space-y-2">
              {events.map(ev => (
                <EventCard key={ev.id} event={ev} daysIndex={daysIndex} onClick={() => onOpenEvent(ev.id)} onEdit={() => setEditingEvent(ev)} onDelete={() => onDeleteEvent(ev.id)} />
              ))}
            </div>
          )}

          {showCreate && (
            <EventEditModal title="New Event" onClose={() => setShowCreate(false)} onSave={(n, c, m) => { onCreateEvent(n, c, m); setShowCreate(false); }} />
          )}
          {editingEvent && (
            <EventEditModal title="Edit Event" initial={editingEvent} onClose={() => setEditingEvent(null)} onSave={(n, c, m) => { onRenameEvent(editingEvent.id, n, c, m); setEditingEvent(null); }} />
          )}
        </div>
      );
    }

    function EventCard({ event, daysIndex, onClick, onEdit, onDelete }) {
      const [confirming, setConfirming] = useState(false);
      const myDays = daysIndex.filter(d => d.eventId === event.id);
      const activeDays = myDays.filter(d => d.status === 'active').length;
      const totalOut = myDays.reduce((s, d) => s + (d.dayTotal || 0), 0);

      return (
        <div className="bg-surface border border-line rounded-xl overflow-hidden fade-in">
          <div className="px-3 py-3 flex items-center gap-3">
            <button type="button" onClick={onClick} className="flex-1 flex items-center gap-3 min-w-0 text-left active:opacity-60">
              <div className="text-2xl shrink-0">📁</div>
              <div className="flex-1 min-w-0">
                <div className="flex items-center gap-1.5 min-w-0">
                  <span className="font-display font-extrabold text-base truncate text-1">{event.name}</span>
                  {event.monthYear && (
                    <span className="text-[9px] font-data font-bold text-3 px-1.5 py-0.5 rounded bg-surface-2 border border-line shrink-0">{monthYearShort(event.monthYear)}</span>
                  )}
                </div>
                {event.city && (
                  <div className="text-[11px] text-3 font-data flex items-center gap-0.5 truncate">
                    <MapPin className="w-3 h-3" strokeWidth={2} /> {event.city}
                  </div>
                )}
                <div className="text-[11px] text-3 font-data mt-0.5">
                  {myDays.length} day{myDays.length !== 1 ? 's' : ''}
                  {activeDays > 0 && <span className="text-accent"> · {activeDays} live</span>}
                  {totalOut > 0 && <span className="text-amber"> · {totalOut} out</span>}
                </div>
              </div>
            </button>
            <div className="flex items-center gap-0.5 shrink-0">
              {confirming ? (
                <div className="flex flex-col gap-1 items-end">
                  <div className="text-[10px] text-danger font-bold leading-tight text-right">Delete event<br/>+ {myDays.length} day{myDays.length !== 1 ? 's' : ''}?</div>
                  <div className="flex gap-1">
                    <button onClick={onDelete} className="px-2 py-0.5 bg-danger rounded text-[10px] font-bold">DELETE</button>
                    <button onClick={() => setConfirming(false)} className="p-0.5 text-4"><X className="w-3 h-3" /></button>
                  </div>
                </div>
              ) : (
                <>
                  <button onClick={onEdit} className="p-1.5 text-4 hover:text-accent" aria-label="Edit"><Edit3 className="w-3.5 h-3.5" /></button>
                  <button onClick={() => setConfirming(true)} className="p-1.5 text-4 hover:text-danger" aria-label="Delete"><Trash2 className="w-3.5 h-3.5" /></button>
                  <button onClick={onClick} className="p-1 text-5 active:opacity-60"><ChevronRight className="w-4 h-4" /></button>
                </>
              )}
            </div>
          </div>
        </div>
      );
    }

    function EventEditModal({ title, initial, onClose, onSave }) {
      const [name, setName] = useState(initial?.name || '');
      const [city, setCity] = useState(initial?.city || '');
      const [monthYear, setMonthYear] = useState(initial?.monthYear || '');
      return (
        <Modal onClose={onClose}>
          <h3 className="font-display text-lg font-bold mb-3 text-1">{title}</h3>
          <div className="space-y-2 mb-4">
            <label className="block">
              <span className="text-[10px] uppercase tracking-widest text-3 font-data font-bold">Event Name</span>
              <input autoFocus value={name} onChange={e => setName(e.target.value)} placeholder="e.g. LA County Fair" className="input mt-0.5 w-full rounded-md px-3 py-2 text-sm placeholder-mute" />
            </label>
            <label className="block">
              <span className="text-[10px] uppercase tracking-widest text-3 font-data font-bold">City <span className="text-4 normal-case tracking-normal">(optional)</span></span>
              <input value={city} onChange={e => setCity(e.target.value)} placeholder="e.g. Los Angeles, CA" className="input mt-0.5 w-full rounded-md px-3 py-2 text-sm placeholder-mute" />
            </label>
            <label className="block">
              <span className="text-[10px] uppercase tracking-widest text-3 font-data font-bold">Month/Year <span className="text-4 normal-case tracking-normal">(optional)</span></span>
              <input type="month" value={monthYear} onChange={e => setMonthYear(e.target.value)} className="input mt-0.5 w-full rounded-md px-3 py-2 text-sm placeholder-mute" />
              {monthYear && <div className="text-[10px] text-3 font-data mt-1">→ Displays as <b className="text-accent">{monthYearShort(monthYear)}</b></div>}
            </label>
          </div>
          <div className="flex gap-2">
            <button onClick={onClose} className="flex-1 bg-surface-2 text-2 font-semibold py-2 rounded-md text-sm border border-line">Cancel</button>
            <button onClick={() => name.trim() && onSave(name, city, monthYear)} disabled={!name.trim()} className="flex-1 bg-inverse font-bold py-2 rounded-md text-sm disabled:opacity-50">Save</button>
          </div>
        </Modal>
      );
    }

    // === EVENT DETAIL ===
    function EventDetail({ event, eventDays, onBack, onOpenDay, onCreateDay, onDeleteDay, onReorderDay, onRenameEvent, onDeleteEvent, onInfo }) {
      const [editing, setEditing] = useState(false);
      const [confirmDelete, setConfirmDelete] = useState(false);
      const [sortMode, setSortMode] = useState(() => {
        try { return localStorage.getItem('tracker:sortMode') || 'day'; } catch { return 'day'; }
      });
      useEffect(() => {
        try { localStorage.setItem('tracker:sortMode', sortMode); } catch {}
      }, [sortMode]);
      const activeCount = eventDays.filter(d => d.status === 'active').length;
      const totalOut = eventDays.reduce((s, d) => s + (d.dayTotal || 0), 0);

      const sortedDays = useMemo(() => {
        const arr = [...eventDays];
        if (sortMode === 'day') return arr.sort((a, b) => ((a.weekNum||0)*100 + (a.dayNum||0)) - ((b.weekNum||0)*100 + (b.dayNum||0)));
        if (sortMode === 'recent') return arr.sort((a, b) => (b.id || '').localeCompare(a.id || ''));
        return arr;
      }, [eventDays, sortMode]);

      const pillCls = (m) => `flex-1 text-[10px] font-data font-bold py-1.5 rounded-md transition active:scale-95 ${sortMode === m ? 'bg-accent-soft text-1 border border-accent' : 'bg-surface-2 text-3 border border-line'}`;

      return (
        <div className="max-w-2xl mx-auto px-4 pt-4 pb-32">
          <div className="flex items-center justify-between mb-3">
            <button onClick={onBack} className="flex items-center gap-1 text-3 active:scale-95">
              <ChevronLeft className="w-4 h-4" /><span className="text-xs">Home</span>
            </button>
            <div className="flex items-center gap-1.5">
              <InfoButton onClick={onInfo} />
              <ThemeToggle />
            </div>
          </div>

          <div className="mb-4">
            <div className="flex items-start gap-2 mb-1">
              <div className="text-3xl">📁</div>
              <div className="flex-1 min-w-0">
                <div className="flex items-center gap-2 flex-wrap">
                  <h1 className="font-display text-2xl font-extrabold leading-tight text-1 truncate">{event.name}</h1>
                  {event.monthYear && (
                    <span className="text-[10px] font-data font-bold text-2 px-1.5 py-0.5 rounded bg-surface-2 border border-line shrink-0">{monthYearShort(event.monthYear)}</span>
                  )}
                </div>
                {event.city && (
                  <div className="text-xs text-3 font-data flex items-center gap-1">
                    <MapPin className="w-3 h-3" /> {event.city}
                  </div>
                )}
              </div>
              <button onClick={() => setEditing(true)} className="p-1.5 text-4 hover:text-accent" aria-label="Edit event">
                <Edit3 className="w-4 h-4" />
              </button>
            </div>

            <div className="flex items-center gap-3 text-xs font-data px-1 mt-2">
              <span><span className="text-4">Days</span> <b className="text-1">{eventDays.length}</b></span>
              <span className="text-5">·</span>
              <span><span className="text-4">Active</span> <b className="text-accent">{activeCount}</b></span>
              <span className="text-5">·</span>
              <span><span className="text-4">Out</span> <b className="text-amber">{totalOut.toLocaleString()}</b></span>
            </div>
          </div>

          <button onClick={onCreateDay} className="w-full mb-4 bg-inverse font-bold py-3 rounded-xl flex items-center justify-center gap-1.5 active:scale-[0.98]">
            <Plus className="w-4 h-4" strokeWidth={3} />
            <span className="font-display text-base">New Day</span>
          </button>

          {eventDays.length === 0 ? (
            <div className="text-center py-10 border border-dashed border-line rounded-xl">
              <div className="text-3xl mb-1">📋</div>
              <p className="text-sm text-3">Tap <b className="text-accent">New Day</b> to start tracking</p>
            </div>
          ) : (
            <>
              <div className="flex items-center gap-1 mb-2">
                <span className="text-[9px] uppercase tracking-widest text-4 font-data font-bold mr-1 shrink-0">Sort</span>
                <button onClick={() => setSortMode('day')} className={pillCls('day')}>🔢 Day#</button>
                <button onClick={() => setSortMode('recent')} className={pillCls('recent')}>🕐 Recent</button>
                <button onClick={() => setSortMode('manual')} className={pillCls('manual')}>✋ Custom</button>
              </div>
              <div className="bg-surface border border-line rounded-xl overflow-hidden divide-line">
                {sortedDays.map((d, i) => (
                  <DayRow
                    key={d.id}
                    day={d}
                    onClick={() => onOpenDay(d.id)}
                    onDelete={() => onDeleteDay(d.id)}
                    showReorder={sortMode === 'manual'}
                    canMoveUp={i > 0}
                    canMoveDown={i < sortedDays.length - 1}
                    onMoveUp={() => onReorderDay(d.id, 'up')}
                    onMoveDown={() => onReorderDay(d.id, 'down')}
                  />
                ))}
              </div>
            </>
          )}

          <div className="mt-8">
            {confirmDelete ? (
              <div className="bg-danger-soft border border-danger rounded-lg p-3 fade-in">
                <p className="text-xs text-danger font-bold mb-2">⚠️ This deletes the event AND all {eventDays.length} day{eventDays.length !== 1 ? 's' : ''} inside it. Cannot be undone.</p>
                <div className="flex gap-2">
                  <button onClick={() => setConfirmDelete(false)} className="flex-1 bg-surface text-2 font-semibold py-2 rounded-md text-xs border border-line">Cancel</button>
                  <button onClick={onDeleteEvent} className="flex-1 bg-danger font-bold py-2 rounded-md text-xs">Delete Everything</button>
                </div>
              </div>
            ) : (
              <button onClick={() => setConfirmDelete(true)} className="w-full text-3 text-xs flex items-center justify-center gap-1 py-2 hover:text-danger">
                <Trash2 className="w-3 h-3" /> Delete this event
              </button>
            )}
          </div>

          {editing && (
            <EventEditModal title="Edit Event" initial={event} onClose={() => setEditing(false)} onSave={(n, c, m) => { onRenameEvent(n, c, m); setEditing(false); }} />
          )}
        </div>
      );
    }

    function DayRow({ day, onClick, onDelete, showReorder, canMoveUp, canMoveDown, onMoveUp, onMoveDown }) {
      const [confirming, setConfirming] = useState(false);
      return (
        <div className="px-3 py-2.5 flex items-center gap-2 fade-in">
          {showReorder && (
            <div className="flex flex-col gap-0.5 shrink-0 -ml-1">
              <button type="button" onClick={onMoveUp} disabled={!canMoveUp} className="p-0.5 text-3 hover:text-accent disabled:opacity-25 disabled:cursor-not-allowed active:scale-90" aria-label="Move up">
                <ChevronUp className="w-4 h-4" />
              </button>
              <button type="button" onClick={onMoveDown} disabled={!canMoveDown} className="p-0.5 text-3 hover:text-accent disabled:opacity-25 disabled:cursor-not-allowed active:scale-90" aria-label="Move down">
                <ChevronDown className="w-4 h-4" />
              </button>
            </div>
          )}
          <button type="button" onClick={onClick} className="flex-1 flex items-center gap-2.5 min-w-0 text-left active:opacity-60">
            <span className={`text-[9px] uppercase tracking-widest font-data font-bold px-1.5 py-0.5 rounded shrink-0 ${day.status === 'active' ? 'bg-accent-soft' : 'bg-status-closed'}`}>
              {day.status === 'active' ? 'LIVE' : 'CLOSED'}
            </span>
            <div className="flex-1 min-w-0">
              <div className="font-display font-bold text-sm leading-tight text-1">
                Week {day.weekNum} · Day {day.dayNum}
              </div>
              <div className="text-[11px] text-3 font-data leading-tight">{dateNice(day.date)}{day.status === 'closed' ? ` · ${day.dayTotal || 0} out` : ''}</div>
            </div>
          </button>
          {confirming ? (
            <div className="flex gap-1 shrink-0">
              <button type="button" onClick={onDelete} className="px-1.5 py-0.5 bg-danger rounded text-[10px] font-bold">Del</button>
              <button type="button" onClick={() => setConfirming(false)} className="p-0.5 text-4"><X className="w-3 h-3" /></button>
            </div>
          ) : (
            <div className="flex items-center gap-0.5 shrink-0">
              <button type="button" onClick={() => setConfirming(true)} className="p-1 text-4 hover:text-danger"><Trash2 className="w-3.5 h-3.5" /></button>
              <button type="button" onClick={onClick} className="p-0.5 text-5 active:opacity-60"><ChevronRight className="w-4 h-4" /></button>
            </div>
          )}
        </div>
      );
    }

    // === DAY DETAIL ===
    function DayDetail({ day, event, itemsLibrary, onSave, onBack, onExport, onInfo, showToast }) {
      const [editHeader, setEditHeader] = useState(false);
      const [showCloseConfirm, setShowCloseConfirm] = useState(false);
      const update = (patch) => onSave({ ...day, ...patch });
      const isClosed = day.status === 'closed';
      const closeDay = async () => { await onSave({ ...day, status: 'closed', closedAt: new Date().toISOString() }); setShowCloseConfirm(false); showToast('🔒 Closed'); };
      const reopenDay = async () => { await onSave({ ...day, status: 'active', closedAt: null }); showToast('🔓 Reopened'); };
      const dayTotal = Object.values(day.inventory).reduce((s, v) => {
        const start = (v.starting || 0) + (v.restocks || []).reduce((a,r) => a + (r.amount||0), 0);
        if (v.leftover === null || v.leftover === undefined) return s;
        return s + Math.max(0, start - v.leftover);
      }, 0);

      return (
        <div className="max-w-2xl mx-auto px-3 pt-3 pb-32">
          <div className="flex items-center justify-between mb-2.5">
            <button onClick={onBack} className="flex items-center gap-1 text-3 active:scale-95">
              <ChevronLeft className="w-4 h-4" />
              <span className="text-xs truncate max-w-[180px]">{event?.name || 'Back'}</span>
            </button>
            <div className="flex items-center gap-1.5">
              <InfoButton onClick={onInfo} />
              <ThemeToggle />
              <button onClick={onExport} className="p-1.5 rounded-md bg-surface border border-line active:scale-95" aria-label="Export">
                <FileText className="w-3.5 h-3.5 text-3" />
              </button>
            </div>
          </div>

          <div className="bg-surface border border-line rounded-xl p-3 mb-3">
            {editHeader ? (
              <div className="space-y-2 fade-in">
                <div className="grid grid-cols-3 gap-1.5">
                  <SlimInput label="Wk" type="number" value={day.weekNum} onChange={v => update({ weekNum: parseInt(v)||0 })} />
                  <SlimInput label="Day" type="number" value={day.dayNum} onChange={v => update({ dayNum: parseInt(v)||0 })} />
                  <SlimInput label="Date" type="date" value={day.date} onChange={v => update({ date: v })} />
                </div>
                <button onClick={() => setEditHeader(false)} className="w-full bg-inverse font-semibold py-1.5 rounded-md text-xs flex items-center justify-center gap-1">
                  <Check className="w-3 h-3" strokeWidth={3} /> Done
                </button>
              </div>
            ) : (
              <div className="flex items-center justify-between gap-2">
                <button onClick={() => !isClosed && setEditHeader(true)} className="text-left flex-1 min-w-0">
                  <div className="flex items-center gap-1.5 mb-0.5">
                    <span className={`text-[9px] uppercase tracking-widest font-data font-bold px-1.5 py-0.5 rounded ${isClosed ? 'bg-status-closed' : 'bg-accent-soft'}`}>
                      {isClosed ? '🔒 CLOSED' : '🟢 LIVE'}
                    </span>
                    <span className="text-[10px] text-3 font-data">{dateNice(day.date)}</span>
                  </div>
                  <div className="font-display font-extrabold text-lg leading-tight text-1">
                    Week {day.weekNum} · Day {day.dayNum}
                  </div>
                </button>
                <div className="text-right">
                  <div className="text-[8px] uppercase tracking-widest text-4 font-data">Total Out</div>
                  <div className="font-data font-extrabold text-2xl text-amber leading-none">{dayTotal}</div>
                </div>
              </div>
            )}
          </div>

          <SectionLabel emoji="📦" title="Inventory" count={day.activeItems.length} />
          <InventoryGrid day={day} itemsLibrary={itemsLibrary} update={update} isClosed={isClosed} showToast={showToast} />

          <div className="mt-6">
            {isClosed ? (
              <button onClick={reopenDay} className="w-full bg-surface border border-line text-1 font-semibold py-2.5 rounded-lg text-sm flex items-center justify-center gap-1.5 active:scale-[0.98]">
                <Unlock className="w-3.5 h-3.5" /> Reopen Day
              </button>
            ) : (
              <button onClick={() => setShowCloseConfirm(true)} className="w-full bg-danger-soft border border-danger text-danger font-semibold py-2.5 rounded-lg text-sm flex items-center justify-center gap-1.5 active:scale-[0.98]">
                <Lock className="w-3.5 h-3.5" /> Close Out Day
              </button>
            )}
          </div>

          {showCloseConfirm && (
            <Modal onClose={() => setShowCloseConfirm(false)}>
              <div className="text-center">
                <div className="text-3xl mb-2">🔒</div>
                <h3 className="font-display text-lg font-bold mb-1 text-1">Close out this day?</h3>
                <p className="text-3 text-xs mb-4">Totals lock. Can be reopened later. 👌</p>
                <div className="flex gap-2">
                  <button onClick={() => setShowCloseConfirm(false)} className="flex-1 bg-surface-2 text-2 font-semibold py-2 rounded-md text-sm border border-line">Cancel</button>
                  <button onClick={closeDay} className="flex-1 bg-inverse font-bold py-2 rounded-md text-sm">Close Out</button>
                </div>
              </div>
            </Modal>
          )}
        </div>
      );
    }

    function SectionLabel({ emoji, title, count }) {
      return (
        <div className="flex items-center gap-1.5 mb-1.5 px-1">
          <span className="text-sm">{emoji}</span>
          <span className="text-[10px] uppercase tracking-[0.2em] font-data font-bold text-2">{title}</span>
          {count > 0 && <span className="text-[9px] font-data font-bold text-4">· {count}</span>}
        </div>
      );
    }
    function SlimInput({ label, value, onChange, type='text', placeholder='' }) {
      return (
        <label className="block">
          <span className="text-[8px] uppercase tracking-widest text-4 font-data font-bold">{label}</span>
          <input type={type} value={value ?? ''} onChange={e => onChange(e.target.value)} onFocus={e => type === 'number' && e.target.select()} placeholder={placeholder} className="input mt-0.5 w-full rounded-md px-2 py-1 text-xs font-data font-bold placeholder-mute" />
        </label>
      );
    }

    // === INVENTORY ===
    function InventoryGrid({ day, itemsLibrary, update, isClosed, showToast }) {
      const [showAdd, setShowAdd] = useState(false);
      const setItem = (n, p) => update({ inventory: { ...day.inventory, [n]: { ...day.inventory[n], ...p } } });
      const addRestock = (n, a) => {
        if (!a || a <= 0) return;
        const cur = day.inventory[n] || { starting: 0, restocks: [], leftover: null };
        setItem(n, { restocks: [...(cur.restocks || []), { amount: a, time: new Date().toISOString() }] });
        showToast(`+${a} ${n}`);
      };
      const removeRestock = (n, i) => setItem(n, { restocks: day.inventory[n].restocks.filter((_, idx) => idx !== i) });
      const addItem = (n) => {
        if (day.activeItems.includes(n)) return;
        update({ activeItems: [...day.activeItems, n], inventory: { ...day.inventory, [n]: { starting: 0, restocks: [], leftover: null } } });
        setShowAdd(false);
      };
      const removeItem = (n) => {
        const inv = { ...day.inventory }; delete inv[n];
        update({ activeItems: day.activeItems.filter(x => x !== n), inventory: inv });
      };
      const avail = itemsLibrary.filter(i => !day.activeItems.includes(i.name));

      return (
        <div className="space-y-1.5">
          {day.activeItems.length === 0 && (
            <div className="bg-surface border border-dashed border-line rounded-lg px-4 py-5 text-center">
              <p className="text-xs text-3 mb-2">No items in play</p>
              {!isClosed && <button onClick={() => setShowAdd(true)} className="text-accent text-xs font-bold">+ Pick items</button>}
            </div>
          )}
          {day.activeItems.map(name => (
            <CompactItem key={name} name={name} emoji={getEmoji(itemsLibrary, name)}
              data={day.inventory[name] || { starting: 0, restocks: [], leftover: null }}
              isClosed={isClosed}
              onUpdate={(p) => setItem(name, p)}
              onAddRestock={(a) => addRestock(name, a)}
              onRemoveRestock={(i) => removeRestock(name, i)}
              onRemove={() => removeItem(name)} />
          ))}
          {!isClosed && avail.length > 0 && (
            <button onClick={() => setShowAdd(true)} className="w-full bg-surface border border-dashed border-line text-3 py-2 rounded-lg text-xs font-semibold flex items-center justify-center gap-1 active:scale-[0.99]">
              <Plus className="w-3 h-3" /> Add item
            </button>
          )}
          {showAdd && (
            <Modal onClose={() => setShowAdd(false)}>
              <h3 className="font-display text-base font-bold mb-3 text-1">Add item to today</h3>
              {avail.length === 0 ? (
                <div className="text-center py-4 text-3 text-xs">All items added. Add new ones in Settings ⚙️</div>
              ) : (
                <div className="space-y-1">
                  {avail.map(i => (
                    <button key={i.name} onClick={() => addItem(i.name)} className="w-full text-left bg-surface-2 hover:opacity-80 rounded-md px-3 py-2 text-sm font-semibold flex items-center justify-between active:scale-[0.99] text-1 border border-line">
                      <span>{i.emoji} {i.name}</span>
                      <Plus className="w-3.5 h-3.5 text-accent" strokeWidth={3} />
                    </button>
                  ))}
                </div>
              )}
            </Modal>
          )}
        </div>
      );
    }

    function CompactItem({ name, emoji, data, isClosed, onUpdate, onAddRestock, onRemoveRestock, onRemove }) {
      const [restockInput, setRestockInput] = useState('');
      const [expanded, setExpanded] = useState(false);
      const [confirmRm, setConfirmRm] = useState(false);
      const restockTotal = (data.restocks || []).reduce((s, r) => s + (r.amount || 0), 0);
      const start = (data.starting || 0) + restockTotal;
      const lo = data.leftover;
      const has = lo !== null && lo !== undefined && lo !== '';
      const out = has ? Math.max(0, start - Number(lo)) : null;
      const submit = () => { const n = parseInt(restockInput); if (n && n > 0) { onAddRestock(n); setRestockInput(''); } };

      return (
        <div className="bg-surface border border-line rounded-lg overflow-hidden">
          <button onClick={() => setExpanded(!expanded)} type="button" className="w-full px-3 py-2 flex items-center gap-2 text-left active:opacity-80">
            <span className="text-base shrink-0">{emoji}</span>
            <div className="flex-1 min-w-0">
              <div className="flex items-center gap-1.5">
                <span className="font-display font-bold text-sm truncate text-1">{name}</span>
                {restockTotal > 0 && <span className="text-[9px] font-data font-bold bg-accent-soft px-1 py-px rounded">+{restockTotal}</span>}
              </div>
              <div className="text-[10px] font-data text-3 leading-tight">Total start: <b className="text-2">{start}</b></div>
            </div>
            <div className="text-right shrink-0">
              <div className="text-[8px] uppercase tracking-widest text-4 font-data leading-none">Out</div>
              <div className={`font-data font-extrabold text-xl leading-tight ${has ? 'text-amber' : 'text-5'}`}>{out ?? '—'}</div>
            </div>
            <ChevronRight className={`w-4 h-4 text-4 transition-transform shrink-0 ${expanded ? 'rotate-90' : ''}`} />
          </button>
          {expanded && (
            <div className="border-t border-line-soft px-3 py-2.5 bg-surface-2 fade-in">
              <div className="grid grid-cols-2 gap-1.5 mb-2">
                <label className="block">
                  <span className="text-[9px] uppercase tracking-widest text-3 font-data font-bold">Starting</span>
                  <input type="number" inputMode="numeric" value={data.starting || ''} onChange={e => onUpdate({ starting: parseInt(e.target.value) || 0 })} onFocus={e => e.target.select()} disabled={isClosed} placeholder="0" className="input-2 mt-0.5 w-full rounded-md px-2 py-1.5 text-base font-data font-bold disabled:opacity-60 placeholder-mute" />
                </label>
                <label className="block">
                  <span className="text-[9px] uppercase tracking-widest text-3 font-data font-bold">Leftover</span>
                  <input type="number" inputMode="numeric" value={lo === null || lo === undefined ? '' : lo} onChange={e => { const v = e.target.value; onUpdate({ leftover: v === '' ? null : parseInt(v) || 0 }); }} onFocus={e => e.target.select()} disabled={isClosed} placeholder="—" className="input-2 mt-0.5 w-full rounded-md px-2 py-1.5 text-base font-data font-bold disabled:opacity-60 placeholder-mute" />
                </label>
              </div>
              {!isClosed && (
                <div className="flex gap-1.5 mb-2">
                  <input type="number" inputMode="numeric" value={restockInput} onChange={e => setRestockInput(e.target.value)} onFocus={e => e.target.select()} onKeyDown={e => e.key === 'Enter' && submit()} placeholder="+ stock amount" className="input-2 flex-1 rounded-md px-2 py-1.5 text-xs font-data placeholder-mute" />
                  <button onClick={submit} className="px-3 bg-accent rounded-md font-bold text-xs active:scale-95">+ Stock</button>
                </div>
              )}
              {(data.restocks || []).length > 0 && (
                <div className="bg-surface border border-line rounded-md divide-line">
                  {data.restocks.map((r, i) => (
                    <div key={i} className="flex items-center justify-between px-2 py-1 text-[10px] font-data">
                      <span className="text-3 flex items-center gap-1"><Clock className="w-2.5 h-2.5" />{timeShort(r.time)}</span>
                      <span className="font-bold text-accent">+{r.amount}</span>
                      {!isClosed && <button onClick={() => onRemoveRestock(i)} className="text-4 hover:text-danger"><X className="w-2.5 h-2.5" /></button>}
                    </div>
                  ))}
                </div>
              )}
              {!isClosed && (
                <div className="mt-2 flex justify-end">
                  {confirmRm ? (
                    <div className="flex gap-1">
                      <button onClick={onRemove} className="px-2 py-0.5 bg-danger rounded text-[10px] font-bold">Remove item</button>
                      <button onClick={() => setConfirmRm(false)} className="p-0.5 text-4"><X className="w-3 h-3" /></button>
                    </div>
                  ) : (
                    <button onClick={() => setConfirmRm(true)} className="text-[10px] text-4 hover:text-danger flex items-center gap-0.5">
                      <Trash2 className="w-2.5 h-2.5" /> remove
