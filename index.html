    // === LIBRARY ===
    function Library({ items, onChange, onBack, onEndTour, onInfo, showToast, hasData, onExport, onImport }) {
      const [newItem, setNewItem] = useState('');
      const [editing, setEditing] = useState(null);
      const [confirming, setConfirming] = useState(null);
      const [pendingImport, setPendingImport] = useState(null);
      const fileRef = useRef(null);

      const handleExport = async () => {
        try {
          const data = await onExport();
          const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          const stamp = new Date().toISOString().split('T')[0];
          a.download = `premium-backup-${stamp}.json`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
          showToast('📥 Backup downloaded');
        } catch { showToast('❌ Export failed'); }
      };

      const handleImportClick = () => fileRef.current?.click();

      const handleFileChange = async (e) => {
        const file = e.target.files?.[0];
        e.target.value = '';
        if (!file) return;
        try {
          const text = await file.text();
          const data = JSON.parse(text);
          if (!data.version || !data.app) { showToast('❌ Not a valid backup file'); return; }
          setPendingImport(data);
        } catch { showToast('❌ Could not read file'); }
      };

      const handleImportConfirm = async (mode) => {
        const data = pendingImport;
        setPendingImport(null);
        if (!data) return;
        try {
          await onImport(data, mode);
          showToast(mode === 'replace' ? '🔁 Data replaced' : '➕ Data merged');
        } catch { showToast('❌ Import failed'); }
      };

      const addItem = () => {
        const n = newItem.trim();
        if (!n || items.find(i => i.name.toLowerCase() === n.toLowerCase())) return;
        const emoji = smartEmoji(n);
        onChange([...items, { name: n, emoji }]);
        setNewItem('');
        showToast(`${emoji} Added ${n}`);
      };
      const removeItem = (name) => { onChange(items.filter(i => i.name !== name)); setConfirming(null); showToast(`Removed`); };
      const saveEdit = (oldName, newName, newEmoji) => {
        const safeName = newName.trim() || oldName;
        const safeEmoji = newEmoji.trim() || '📦';
        onChange(items.map(i => i.name === oldName ? { name: safeName, emoji: safeEmoji } : i));
        setEditing(null);
        showToast(`Updated`);
      };

      return (
        <div className="max-w-2xl mx-auto px-4 pt-5 pb-32">
          <div className="flex items-center justify-between mb-3">
            <button onClick={onBack} className="flex items-center gap-1 text-3 text-xs"><ChevronLeft className="w-4 h-4" /> Home</button>
            <div className="flex items-center gap-1.5">
              <InfoButton onClick={onInfo} />
              <ThemeToggle />
            </div>
          </div>
          <div className="mb-4">
            <div className="text-[10px] font-data uppercase tracking-[0.25em] text-accent font-bold">Settings</div>
            <h1 className="font-display text-2xl font-extrabold text-1">Items Library 📚</h1>
            <p className="text-3 text-xs mt-1.5">Items you can pick from when starting a day. Add or edit anytime.</p>
          </div>

          <div className="bg-surface border border-line rounded-lg p-2 flex gap-1.5 mb-3">
            <input value={newItem} onChange={e => setNewItem(e.target.value)} onKeyDown={e => e.key === 'Enter' && addItem()} placeholder="New item (Stickers, Hats, etc.)" className="input flex-1 rounded-md px-2.5 py-1.5 text-sm placeholder-mute" />
            <button onClick={addItem} disabled={!newItem.trim()} className="px-3 bg-accent rounded-md font-bold text-xs active:scale-95 disabled:opacity-40 flex items-center gap-0.5"><Plus className="w-3 h-3" strokeWidth={3} /> Add</button>
          </div>

          <div className="bg-surface border border-line rounded-lg overflow-hidden divide-line">
            {items.map(item => (
              <div key={item.name} className="px-3 py-2 flex items-center justify-between gap-2">
                <span className="font-semibold text-sm flex items-center gap-2 text-1 min-w-0">
                  <span className="text-lg shrink-0">{item.emoji}</span>
                  <span className="truncate">{item.name}</span>
                </span>
                {confirming === item.name ? (
                  <div className="flex gap-1 shrink-0">
                    <button onClick={() => removeItem(item.name)} className="px-2 py-0.5 bg-danger rounded text-[10px] font-bold">Remove</button>
                    <button onClick={() => setConfirming(null)} className="p-0.5 text-4"><X className="w-3 h-3" /></button>
                  </div>
                ) : (
                  <div className="flex items-center gap-0.5 shrink-0">
                    <button onClick={() => setEditing(item)} className="p-1.5 text-4 hover:text-accent" aria-label="Edit"><Edit3 className="w-3.5 h-3.5" /></button>
                    <button onClick={() => setConfirming(item.name)} className="p-1.5 text-4 hover:text-danger" aria-label="Remove"><Trash2 className="w-3.5 h-3.5" /></button>
                  </div>
                )}
              </div>
            ))}
            {items.length === 0 && <div className="px-3 py-6 text-center text-4 text-xs">Empty — add one above 👆</div>}
          </div>

          {hasData && (
            <div className="mt-8">
              <div className="text-[10px] font-data uppercase tracking-[0.25em] text-3 font-bold mb-2 px-1">Backup &amp; Sync</div>
              <div className="bg-surface border border-line rounded-xl p-3 space-y-2">
                <button onClick={handleExport} className="w-full bg-surface-2 border border-line rounded-lg px-3 py-2.5 flex items-center gap-2 active:scale-[0.99] text-left">
                  <span className="text-xl">📥</span>
                  <div className="flex-1 min-w-0">
                    <div className="font-display font-bold text-sm text-1">Export Data</div>
                    <div className="text-[11px] text-3 font-data">Download a .json backup of everything</div>
                  </div>
                </button>
                <button onClick={handleImportClick} className="w-full bg-surface-2 border border-line rounded-lg px-3 py-2.5 flex items-center gap-2 active:scale-[0.99] text-left">
                  <span className="text-xl">📤</span>
                  <div className="flex-1 min-w-0">
                    <div className="font-display font-bold text-sm text-1">Import Data</div>
                    <div className="text-[11px] text-3 font-data">Restore from a .json backup file</div>
                  </div>
                </button>
                <input ref={fileRef} type="file" accept="application/json,.json" onChange={handleFileChange} className="hidden" />
              </div>
            </div>
          )}
          {!hasData && (
            <div className="mt-8">
              <div className="text-[10px] font-data uppercase tracking-[0.25em] text-3 font-bold mb-2 px-1">Backup &amp; Sync</div>
              <div className="bg-surface border border-line rounded-xl p-3">
                <button onClick={handleImportClick} className="w-full bg-surface-2 border border-line rounded-lg px-3 py-2.5 flex items-center gap-2 active:scale-[0.99] text-left">
                  <span className="text-xl">📤</span>
                  <div className="flex-1 min-w-0">
                    <div className="font-display font-bold text-sm text-1">Import Data</div>
                    <div className="text-[11px] text-3 font-data">Restore from a .json backup file</div>
                  </div>
                </button>
                <input ref={fileRef} type="file" accept="application/json,.json" onChange={handleFileChange} className="hidden" />
              </div>
            </div>
          )}

          {hasData && (
            <div className="mt-8">
              <div className="text-[10px] font-data uppercase tracking-[0.25em] text-3 font-bold mb-2 px-1">End of Tour</div>
              <button onClick={onEndTour} className="w-full summary-gradient border border-line rounded-xl p-4 flex items-center gap-3 active:scale-[0.99]">
                <div className="text-3xl">🏆</div>
                <div className="flex-1 text-left">
                  <div className="font-display font-extrabold text-base text-1">End Tour</div>
                  <div className="text-xs text-2">Generate a beautiful summary card you can save & share</div>
                </div>
                <ChevronRight className="w-5 h-5 text-3" />
              </button>
            </div>
          )}

          {editing && (
            <EditItemModal item={editing} onClose={() => setEditing(null)} onSave={(name, emoji) => saveEdit(editing.name, name, emoji)} />
          )}

          {pendingImport && (
            <Modal onClose={() => setPendingImport(null)}>
              <h3 className="font-display text-lg font-bold mb-1 text-1">📦 Import Backup</h3>
              <p className="text-xs text-3 mb-3 font-data">
                Found <b className="text-1">{pendingImport.events?.length || 0}</b> event{(pendingImport.events?.length || 0) !== 1 ? 's' : ''} with <b className="text-1">{pendingImport.daysIndex?.length || 0}</b> day{(pendingImport.daysIndex?.length || 0) !== 1 ? 's' : ''}.
                {pendingImport.app && pendingImport.app !== 'tracker' && (<span className="block mt-1 text-amber">⚠️ From "{pendingImport.app}" app — compatible but may differ slightly.</span>)}
              </p>
              <p className="text-sm text-2 mb-3">What do you want to do?</p>
              <div className="space-y-2">
                <button onClick={() => handleImportConfirm('replace')} className="w-full bg-danger-soft border border-danger rounded-lg p-3 text-left active:scale-[0.99]">
                  <div className="font-display font-extrabold text-sm text-danger">🔁 Replace All</div>
                  <div className="text-[11px] text-2 mt-0.5">Wipe current data, restore from backup</div>
                </button>
                <button onClick={() => handleImportConfirm('merge')} className="w-full bg-accent-soft border border-accent rounded-lg p-3 text-left active:scale-[0.99]">
                  <div className="font-display font-extrabold text-sm text-1">➕ Merge In</div>
                  <div className="text-[11px] text-2 mt-0.5">Keep current data, add events/days from backup that aren't already here</div>
                </button>
                <button onClick={() => setPendingImport(null)} className="w-full bg-surface-2 border border-line rounded-lg p-3 text-left active:scale-[0.99]">
                  <div className="font-display font-extrabold text-sm text-2">❌ Cancel</div>
                  <div className="text-[11px] text-3 mt-0.5">Don't change anything</div>
                </button>
              </div>
            </Modal>
          )}
        </div>
      );
    }

    function EditItemModal({ item, onClose, onSave }) {
      const [name, setName] = useState(item.name);
      const [emoji, setEmoji] = useState(item.emoji);
      const suggestions = [item.emoji, smartEmoji(name), '📦', '🎁', '✨', '🏷️', '👕', '🛍️', '💧'].filter((v, i, a) => v && a.indexOf(v) === i).slice(0, 6);
      return (
        <Modal onClose={onClose}>
          <h3 className="font-display text-lg font-bold mb-3 text-1">Edit Item</h3>
          <div className="space-y-2 mb-3">
            <label className="block">
              <span className="text-[10px] uppercase tracking-widest text-3 font-data font-bold">Name</span>
              <input value={name} onChange={e => setName(e.target.value)} autoFocus className="input mt-0.5 w-full rounded-md px-3 py-2 text-sm placeholder-mute" />
            </label>
            <label className="block">
              <span className="text-[10px] uppercase tracking-widest text-3 font-data font-bold">Emoji</span>
              <input value={emoji} onChange={e => setEmoji(e.target.value)} maxLength={4} placeholder="📦" className="input mt-0.5 w-full rounded-md px-3 py-2 text-xl text-center placeholder-mute" />
            </label>
            <div>
              <span className="text-[10px] uppercase tracking-widest text-3 font-data font-bold">Suggestions</span>
              <div className="flex gap-1.5 mt-1 flex-wrap">
                {suggestions.map(e => (
                  <button key={e} onClick={() => setEmoji(e)} className={`text-xl w-9 h-9 rounded-md border ${emoji === e ? 'border-accent bg-accent-soft' : 'border-line bg-surface-2'} active:scale-95`}>{e}</button>
                ))}
              </div>
            </div>
          </div>
          <div className="flex gap-2">
            <button onClick={onClose} className="flex-1 bg-surface-2 text-2 font-semibold py-2 rounded-md text-sm border border-line">Cancel</button>
            <button onClick={() => onSave(name, emoji)} disabled={!name.trim()} className="flex-1 bg-inverse font-bold py-2 rounded-md text-sm disabled:opacity-50">Save</button>
          </div>
        </Modal>
      );
    }

    // === TOUR SUMMARY ===
    function TourSummary({ events, daysIndex, itemsLibrary, theme, onBack, onStartNewTour, onInfo, showToast }) {
      const [stats, setStats] = useState(null);
      const [funFact, setFunFact] = useState(null);
      const [showResetConfirm, setShowResetConfirm] = useState(false);
      const [working, setWorking] = useState(false);
      const cardRef = useRef(null);
      const [congratsMsg] = useState(() => CONGRATS[Math.floor(Math.random() * CONGRATS.length)]);

      useEffect(() => { (async () => {
        // Compute stats from index + load each day for inventory details
        const itemTotals = {};
        let totalGivenOut = 0;
        for (const dEntry of daysIndex) {
          const full = await sget(`d:${dEntry.id}`, null);
          if (!full) continue;
          (full.activeItems || []).forEach(name => {
            const v = full.inventory[name] || {};
            const start = (v.starting || 0) + (v.restocks || []).reduce((a,r) => a + (r.amount||0), 0);
            const lo = v.leftover;
            if (lo === null || lo === undefined) return;
            const given = Math.max(0, start - lo);
            itemTotals[name] = (itemTotals[name] || 0) + given;
            totalGivenOut += given;
          });
        }
        const dates = daysIndex.map(d => d.date).filter(Boolean).sort();
        const cities = [...new Set(events.map(e => e.city).filter(Boolean))];
        const itemRows = Object.entries(itemTotals).sort((a, b) => b[1] - a[1]);
        const maxItem = Math.max(1, ...Object.values(itemTotals));

        setStats({
          totalGivenOut, itemTotals, itemRows, maxItem,
          days: daysIndex.length, events: events.length, cities: cities.length, cityList: cities,
          firstDate: dates[0], lastDate: dates[dates.length - 1]
        });
        setFunFact(getFunFact({
          totalGivenOut,
          days: daysIndex.length, events: events.length, cities: cities.length
        }));
      })(); }, []);

      const handleSaveImage = async () => {
        if (!cardRef.current || working) return;
        setWorking(true);
        try {
          const canvas = await html2canvas(cardRef.current, {
            backgroundColor: theme === 'dark' ? '#0a0a0a' : '#f5f5f4',
            scale: 2,
            useCORS: true,
            logging: false
          });
          canvas.toBlob(blob => {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `tour-summary-${todayISO()}.png`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('📸 Saved!');
          }, 'image/png');
        } catch (e) {
          console.error(e);
          showToast('Save failed 😕');
        }
        setWorking(false);
      };

      const handleCopyText = async () => {
        if (!stats) return;
        const lines = [];
        lines.push(`🏆 TOUR COMPLETE`);
        lines.push(`━━━━━━━━━━━━━━━━━`);
        if (stats.firstDate && stats.lastDate) lines.push(`${dateShort(stats.firstDate)} → ${dateShort(stats.lastDate)}`);
        lines.push(``);
        lines.push(`📦 Total Given Out: ${stats.totalGivenOut.toLocaleString()}`);
        lines.push(`📅 Days Worked: ${stats.days}`);
        lines.push(`📁 Events: ${stats.events}`);
        if (stats.cities > 0) lines.push(`📍 Cities: ${stats.cities} (${stats.cityList.join(', ')})`);
        lines.push(``);
        if (stats.itemRows.length > 0) {
          lines.push(`📊 By Item:`);
          stats.itemRows.forEach(([name, val]) => {
            lines.push(`  ${getEmoji(itemsLibrary, name)} ${name}: ${val.toLocaleString()}`);
          });
          lines.push(``);
        }
        lines.push(congratsMsg);
        if (funFact) {
          lines.push(``);
          lines.push(`🎲 Fun Fact: ${funFact}`);
        }
        try {
          await navigator.clipboard.writeText(lines.join('\n'));
          showToast('📋 Copied!');
        } catch {
          showToast('Copy failed');
        }
      };

      if (!stats) {
        return (
          <div className="max-w-2xl mx-auto px-4 pt-5 pb-32">
            <div className="flex items-center justify-between mb-3">
              <button onClick={onBack} className="flex items-center gap-1 text-3 text-xs"><ChevronLeft className="w-4 h-4" /> Back</button>
              <ThemeToggle />
            </div>
            <div className="text-center py-12 text-3 text-sm font-data">Crunching numbers…</div>
          </div>
        );
      }

      return (
        <div className="max-w-2xl mx-auto px-4 pt-5 pb-32">
          <div className="flex items-center justify-between mb-3">
            <button onClick={onBack} className="flex items-center gap-1 text-3 text-xs"><ChevronLeft className="w-4 h-4" /> Back</button>
            <div className="flex items-center gap-1.5">
              <InfoButton onClick={onInfo} />
              <ThemeToggle />
            </div>
          </div>

          {/* Summary card (the bit that gets exported as PNG) */}
          <div ref={cardRef} className="summary-gradient rounded-2xl p-5 mb-4 border border-line">
            <div className="text-center mb-4">
              <div className="text-5xl mb-2">🏆</div>
              <h1 className="font-display text-3xl font-extrabold text-1 leading-tight">Tour Complete!</h1>
              {stats.firstDate && stats.lastDate && (
                <p className="text-xs text-3 font-data mt-1">
                  {dateShort(stats.firstDate)} → {dateShort(stats.lastDate)}
                </p>
              )}
            </div>

            {/* Hero number */}
            <div className="bg-surface border border-line rounded-xl p-4 mb-3 text-center">
              <div className="text-[10px] uppercase tracking-widest text-3 font-data font-bold">Total Given Out</div>
              <div className="font-display font-extrabold text-5xl text-amber leading-none mt-1">{stats.totalGivenOut.toLocaleString()}</div>
              <div className="text-[10px] uppercase tracking-widest text-3 font-data font-bold mt-1">items</div>
            </div>

            {/* Stats row */}
            <div className="grid grid-cols-3 gap-2 mb-3">
              <StatBox emoji="📅" label="Days" value={stats.days} />
              <StatBox emoji="📁" label="Events" value={stats.events} />
              <StatBox emoji="📍" label="Cities" value={stats.cities || '—'} />
            </div>

            {/* Items chart */}
            {stats.itemRows.length > 0 && (
              <div className="bg-surface border border-line rounded-xl p-3 mb-3">
                <div className="text-[10px] uppercase tracking-widest text-3 font-data font-bold mb-2">📊 By Item</div>
                <div className="space-y-1.5">
                  {stats.itemRows.map(([name, val]) => (
                    <div key={name} className="flex items-center gap-2">
                      <div className="text-xs flex items-center gap-1 w-28 shrink-0">
                        <span>{getEmoji(itemsLibrary, name)}</span>
                        <span className="truncate text-1 font-semibold">{name}</span>
                      </div>
                      <div className="flex-1 h-5 bg-surface-2 rounded overflow-hidden relative">
                        <div className="absolute inset-y-0 left-0 bg-accent" style={{ width: `${(val / stats.maxItem) * 100}%` }}></div>
                      </div>
                      <div className="font-data font-bold text-xs text-1 w-12 text-right">{val.toLocaleString()}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* Cities */}
            {stats.cityList.length > 0 && (
              <div className="bg-surface border border-line rounded-xl p-3 mb-3">
                <div className="text-[10px] uppercase tracking-widest text-3 font-data font-bold mb-1.5">📍 Cities Visited</div>
                <div className="flex flex-wrap gap-1.5">
                  {stats.cityList.map(c => (
                    <span key={c} className="text-xs font-semibold bg-surface-2 border border-line rounded-full px-2 py-0.5 text-1">{c}</span>
                  ))}
                </div>
              </div>
            )}

            {/* Fun Fact */}
            {funFact && (
              <div className="bg-surface border border-line rounded-xl p-3 mb-3">
                <div className="text-[9px] uppercase tracking-widest text-3 font-data font-bold mb-1.5 text-center">🎲 Random Fun Fact</div>
                <p className="text-xs text-2 leading-relaxed text-center">{funFact}</p>
              </div>
            )}

            {/* Congrats */}
            <div className="text-center text-sm font-semibold text-1 px-2 py-3">
              {congratsMsg}
            </div>
          </div>

          {/* Action buttons (NOT inside cardRef, so they don't appear in the PNG) */}
          <div className="grid grid-cols-2 gap-2 mb-3">
            <button onClick={handleSaveImage} disabled={working} className="bg-inverse font-bold py-2.5 rounded-md flex items-center justify-center gap-1.5 text-sm active:scale-95 disabled:opacity-50">
              <ImageIcon className="w-3.5 h-3.5" strokeWidth={2.5} /> {working ? 'Saving…' : 'Save as PNG'}
            </button>
            <button onClick={handleCopyText} className="bg-surface text-1 border border-line font-bold py-2.5 rounded-md flex items-center justify-center gap-1.5 text-sm active:scale-95">
              <Copy className="w-3.5 h-3.5" strokeWidth={2.5} /> Copy Text
            </button>
          </div>

          {/* Start new tour */}
          <div className="mt-8 pt-6 border-t border-line-soft">
            <p className="text-center text-xs text-3 mb-3">Ready for the next adventure?</p>
            <button onClick={() => setShowResetConfirm(true)} className="w-full bg-danger-soft border border-danger text-danger font-semibold py-2.5 rounded-lg text-sm flex items-center justify-center gap-1.5 active:scale-[0.98]">
              🧹 Start New Tour
            </button>
            <p className="text-[10px] text-4 text-center mt-2">This wipes all events &amp; days. Library resets to defaults.</p>
          </div>

          {showResetConfirm && (
            <Modal onClose={() => setShowResetConfirm(false)}>
              <div className="text-center">
                <div className="text-3xl mb-2">🧹</div>
                <h3 className="font-display text-lg font-bold mb-1 text-1">Start a fresh tour?</h3>
                <p className="text-3 text-xs mb-4">All events &amp; days will be deleted. Make sure you saved the summary first! 📸</p>
                <div className="flex gap-2">
                  <button onClick={() => setShowResetConfirm(false)} className="flex-1 bg-surface-2 text-2 font-semibold py-2 rounded-md text-sm border border-line">Cancel</button>
                  <button onClick={() => { setShowResetConfirm(false); onStartNewTour(); }} className="flex-1 bg-danger font-bold py-2 rounded-md text-sm">Wipe &amp; Start</button>
                </div>
              </div>
            </Modal>
          )}
        </div>
      );
    }

    function StatBox({ emoji, label, value }) {
      return (
        <div className="bg-surface border border-line rounded-xl p-3 text-center">
          <div className="text-xl mb-0.5">{emoji}</div>
          <div className="font-data font-extrabold text-xl text-1 leading-none">{value}</div>
          <div className="text-[9px] uppercase tracking-widest text-3 font-data font-bold mt-1">{label}</div>
        </div>
      );
    }

    // === EXPORT (per day) ===
    function ExportView({ day, itemsLibrary, onBack, onInfo, showToast }) {
      const summary = generateSummary(day, itemsLibrary);
      const csv = generateCSV(day);
      const copyText = async () => { try { await navigator.clipboard.writeText(summary); showToast('📋 Copied'); } catch { showToast('Copy failed'); } };
      const downloadCSV = () => {
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        const safe = (day.eventName || 'event').replace(/[^a-z0-9]/gi, '_');
        a.download = `${safe}_W${day.weekNum}_D${day.dayNum}_${day.date}.csv`;
        a.click();
        URL.revokeObjectURL(url);
        showToast('💾 Downloaded');
      };

      return (
        <div className="max-w-2xl mx-auto px-4 pt-5 pb-32">
          <div className="flex items-center justify-between mb-3">
            <button onClick={onBack} className="flex items-center gap-1 text-3 text-xs"><ChevronLeft className="w-4 h-4" /> Back</button>
            <div className="flex items-center gap-1.5">
              <InfoButton onClick={onInfo} />
              <ThemeToggle />
            </div>
          </div>
          <div className="mb-4">
            <div className="text-[10px] font-data uppercase tracking-[0.25em] text-accent font-bold">Day Summary</div>
            <h1 className="font-display text-2xl font-extrabold text-1">Export 📤</h1>
          </div>
          <div className="grid grid-cols-2 gap-2 mb-4">
            <button onClick={copyText} className="bg-inverse font-bold py-2.5 rounded-md flex items-center justify-center gap-1.5 text-sm active:scale-95"><Copy className="w-3.5 h-3.5" strokeWidth={2.5} /> Copy Text</button>
            <button onClick={downloadCSV} className="bg-surface text-1 border border-line font-bold py-2.5 rounded-md flex items-center justify-center gap-1.5 text-sm active:scale-95"><Download className="w-3.5 h-3.5" strokeWidth={2.5} /> CSV</button>
          </div>
          <div className="bg-surface border border-line rounded-lg p-3">
            <div className="text-[10px] uppercase tracking-widest text-4 font-data mb-1.5">Preview</div>
            <pre className="text-[11px] font-data whitespace-pre-wrap text-2 leading-relaxed">{summary}</pre>
          </div>
        </div>
      );
    }

    function generateSummary(day, itemsLibrary) {
      let s = `📋 DAILY RECAP\n━━━━━━━━━━━━━━━━━━\n`;
      s += `Event: ${day.eventName || 'Untitled'}\nWeek ${day.weekNum} · Day ${day.dayNum} · ${dateNice(day.date)}\nStatus: ${day.status === 'closed' ? '🔒 Closed' : '🟢 Active'}\n\n`;
      s += `📦 INVENTORY\n──────────────────\n`;
      let dt = 0;
      day.activeItems.forEach(name => {
        const v = day.inventory[name] || {};
        const rt = (v.restocks || []).reduce((a,r) => a + (r.amount||0), 0);
        const start = (v.starting || 0) + rt;
        const lo = v.leftover;
        const given = (lo === null || lo === undefined) ? null : Math.max(0, start - lo);
        if (given !== null) dt += given;
        s += `${getEmoji(itemsLibrary, name)} ${name}\n  Start: ${v.starting || 0}${rt ? ` (+${rt})` : ''} = ${start}\n  Leftover: ${lo ?? '—'}\n  Given: ${given ?? '—'}\n\n`;
      });
      s += `TOTAL GIVEN OUT: ${dt}\n`;
      return s;
    }

    function generateCSV(day) {
      let rows = [['Event', day.eventName || ''], ['Week', day.weekNum], ['Day', day.dayNum], ['Date', day.date], ['Status', day.status], [], ['INVENTORY'], ['Item','Starting','Restocks','Total Start','Leftover','Given Out']];
      day.activeItems.forEach(name => {
        const v = day.inventory[name] || {};
        const rt = (v.restocks || []).reduce((a,r) => a + (r.amount||0), 0);
        const start = (v.starting || 0) + rt;
        const lo = v.leftover;
        const g = (lo === null || lo === undefined) ? '' : Math.max(0, start - lo);
        rows.push([name, v.starting || 0, rt, start, lo ?? '', g]);
      });
      return rows.map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(',')).join('\n');
    }

    // === MODAL ===
    function Modal({ children, onClose }) {
      return (
        <div className="fixed inset-0 z-40 flex items-start justify-center p-3 pt-6 modal-overlay backdrop-blur-sm fade-in" onClick={onClose}>
          <div onClick={e => e.stopPropagation()} className="bg-surface border border-line rounded-xl p-4 w-full max-w-sm shadow-2xl max-h-[85vh] overflow-y-auto">{children}</div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
