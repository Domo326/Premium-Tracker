    const Download = (p) => <Svg {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></Svg>;

    const Trash2 = (p) => <Svg {...p}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></Svg>;

    const Settings = (p) => <Svg {...p}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></Svg>;
    const Sun = (p) => <Svg {...p}><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></Svg>;
    const Moon = (p) => <Svg {...p}><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></Svg>;
    const Wave = (p) => <Svg {...p}><path d="M2 6c.6-.5 1.2-1 2.5-1 2.5 0 2.5 2 5 2 2.6 0 2.4-2 5-2 2.5 0 2.5 2 5 2 1.3 0 1.9-.5 2.5-1"/><path d="M2 12c.6-.5 1.2-1 2.5-1 2.5 0 2.5 2 5 2 2.6 0 2.4-2 5-2 2.5 0 2.5 2 5 2 1.3 0 1.9-.5 2.5-1"/><path d="M2 18c.6-.5 1.2-1 2.5-1 2.5 0 2.5 2 5 2 2.6 0 2.4-2 5-2 2.5 0 2.5 2 5 2 1.3 0 1.9-.5 2.5-1"/></Svg>;
    const Info = (p) => <Svg {...p}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></Svg>;
    const Edit3 = (p) => <Svg {...p}><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 1 1 3 3L7 19l-4 1 1-4Z"/></Svg>;
    const MapPin = (p) => <Svg {...p}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></Svg>;
    const ImageIcon = (p) => <Svg {...p}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></Svg>;

    // === CONSTANTS ===
    const DEFAULT_ITEMS = [
      { name: 'T-Shirts', emoji: '👕' },
      { name: 'Bags', emoji: '🛍️' }
    ];
    const BMC_URL = 'https://buymeacoffee.com/Domo326';
    const CONGRATS = [
      "🎉 Great job out there! Safe travels on your next adventure!",
      "🌟 What a tour! You crushed it. Onwards to the next one!",
      "🚀 Look at those numbers! Take a breather, you earned it.",
      "👏 Tour complete! May your next one be even better.",
      "🏆 Champion behavior. Have fun on the road ahead!"
    ];

    function getFunFact(stats) {
      const facts = [];
      const total = stats.totalGivenOut;
      const days = stats.days;
      const cities = stats.cities;
      const events = stats.events;

      if (total > 0) {
        facts.push(`📦 If each item weighed 1 lb, you moved ${total.toLocaleString()} lbs of swag — about the weight of ${Math.max(1, Math.round(total/180)).toLocaleString()} grown adults.`);
        facts.push(`🎁 You handed out more freebies than your average Black Friday Best Buy line.`);
        facts.push(`🤯 ${total.toLocaleString()} items! At 5 seconds each, that's ${Math.round(total*5/3600).toLocaleString()}+ hours of pure giveaway energy.`);
        facts.push(`🛒 Enough swag to fill ~${Math.max(1, Math.round(total/200)).toLocaleString()} shopping carts. The Costco moms would be jealous.`);
        if (days > 0) facts.push(`⚡ That's ~${Math.round(total/days).toLocaleString()} items per day. Santa Claus is taking notes.`);
        const pallets = Math.max(1, Math.round(total/500));
        facts.push(`🚚 Stacked on pallets, that's roughly ${pallets} pallet${pallets !== 1 ? 's' : ''} of stuff. Your truck earned its rent.`);
        facts.push(`🌮 ${total.toLocaleString()} items is about the same as how many tacos a small town eats in a week. Just saying.`);
      }
      if (cities > 1) {
        facts.push(`🗺️ ${cities} cities visited — you're basically a rock band at this point. 🎸`);
        facts.push(`✈️ ${cities} cities! That's more places than the average American visits in an entire year.`);
        facts.push(`🚗 An average person would need a serious road trip to hit all ${cities} of these cities. You did it for work.`);
        facts.push(`📍 ${cities} cities means ${cities} different "where's the nearest Chipotle?" moments. We salute you.`);
      }
      if (events > 2) {
        facts.push(`📁 ${events} events. Each one had its own vibe and you handled them all. Pro move. 🏅`);
      }
      if (days > 7) {
        facts.push(`📅 ${days} days on the road — that's ${Math.round(days/7)} weekends sacrificed for the tour. 🫡`);
        facts.push(`☕ ${days} working days = roughly ${days*2} coffees consumed. You're personally funding a barista's vacation.`);
        facts.push(`🛏️ ${days} hotel nights of "why is the WiFi password 'welcome' but also nothing works?"`);
        facts.push(`📶 ${days} days of testing every gas station's bathroom on the way. Heroic, honestly.`);
      }
      facts.push(`🎯 Mission accomplished. The brand should send you a thank-you card.`);
      facts.push(`🏅 Tour managers are the unsung heroes of marketing. This one's for you.`);
      facts.push(`🚌 Your truck has stories now. Don't let it forget you.`);
      facts.push(`🎬 That's a wrap. Hollywood-level execution.`);
      facts.push(`🔥 You're the reason this whole marketing budget actually did something cool.`);

      return facts[Math.floor(Math.random() * facts.length)];
    }

    // Smart emoji matching
    const EMOJI_MAP = {
      bag: '🛍️', bags: '🛍️', tote: '🛍️', totes: '🛍️',
      bottle: '💧', bottles: '💧', water: '💧',
      fan: '🪭', fans: '🪭',
      shirt: '👕', shirts: '👕', tshirt: '👕', tshirts: '👕', 't-shirt': '👕', 't-shirts': '👕', tee: '👕', tees: '👕',
      hat: '🎩', hats: '🎩', cap: '🧢', caps: '🧢',
      sticker: '🏷️', stickers: '🏷️',
      sample: '📦', samples: '📦',
      pen: '🖊️', pens: '🖊️',
      keychain: '🔑', keychains: '🔑',
      lanyard: '🪢', lanyards: '🪢',
      'cooling towel': '❄️', 'cooling towels': '❄️', towel: '🧻', towels: '🧻',
      funko: '🎎', 'funko pop': '🎎', 'funko pops': '🎎',
      koozie: '🥤', koozies: '🥤', cup: '🥤', cups: '🥤', mug: '☕', mugs: '☕',
      poster: '🖼️', posters: '🖼️',
      flag: '🚩', flags: '🚩',
      bracelet: '📿', bracelets: '📿', wristband: '⌚', wristbands: '⌚',
      backpack: '🎒', backpacks: '🎒',
      notebook: '📓', notebooks: '📓',
      button: '🔘', buttons: '🔘', pin: '📌', pins: '📌',
      snack: '🍿', snacks: '🍿', candy: '🍬',
      card: '🃏', cards: '🃏',
      ball: '⚽', balls: '⚽',
      toy: '🧸', toys: '🧸',
      phone: '📱', tablet: '📱', tablets: '📱',
      magnet: '🧲', magnets: '🧲',
      hoodie: '🧥', hoodies: '🧥',
      sock: '🧦', socks: '🧦',
      umbrella: '☂️', sunglasses: '🕶️',
      charger: '🔌', chargers: '🔌', cable: '🔌', cables: '🔌'
    };
    function smartEmoji(name) {
      if (!name) return '📦';
      const lower = name.toLowerCase().trim();
      if (EMOJI_MAP[lower]) return EMOJI_MAP[lower];
      for (const [key, emoji] of Object.entries(EMOJI_MAP)) {
        if (lower.includes(key)) return emoji;
      }
      return '📦';
    }

    // === HELPERS ===
    const todayISO = () => new Date().toISOString().slice(0, 10);
    const timeShort = (iso) => { try { return new Date(iso).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' }); } catch { return ''; }};
    const dateNice = (iso) => { try { return new Date(iso + 'T12:00:00').toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' }); } catch { return iso; }};
    const dateShort = (iso) => { try { return new Date(iso + 'T12:00:00').toLocaleDateString([], { month: 'short', day: 'numeric' }); } catch { return iso; }};
    const monthYearShort = (iso) => {
      if (!iso || typeof iso !== 'string') return null;
      try {
        const [y, m] = iso.split('-');
        if (!y || !m) return null;
        const d = new Date(parseInt(y), parseInt(m) - 1, 1);
        if (isNaN(d.getTime())) return null;
        return `${d.toLocaleDateString([], { month: 'short' })}/${y.slice(2)}`;
      } catch { return null; }

    function cityEmoji(city) {
      if (!city) return null;
      const normalized = city.trim().toLowerCase().split(',')[0].trim();

    // === WEATHER (Open-Meteo, free, no API key) ===
    const WX_TTL_FUTURE = 6 * 60 * 60 * 1000;
    const GEO_TTL = 60 * 24 * 60 * 60 * 1000;

    async function geocodeCity(city) {
      if (!city) return null;
      const norm = city.trim().toLowerCase();
      const key = `tracker:geo:${norm}`;
      try {
        const cached = JSON.parse(localStorage.getItem(key) || 'null');
        if (cached && cached.lat != null && Date.now() - (cached.ts || 0) < GEO_TTL) return cached;
      } catch {}
      try {
        const q = city.split(',')[0].trim();
        const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=1&language=en&format=json`);
        const json = await res.json();
        const r = json?.results?.[0];
        if (!r) return null;
        const data = { lat: r.latitude, lon: r.longitude, name: r.name, ts: Date.now() };
        try { localStorage.setItem(key, JSON.stringify(data)); } catch {}
        return data;
      } catch { return null; }
    }

    async function fetchWeather(lat, lon, date) {
      if (lat == null || lon == null || !date) return null;
      const key = `tracker:wx:${lat.toFixed(2)}|${lon.toFixed(2)}|${date}`;
      const now = Date.now();
      const today = new Date().toISOString().slice(0, 10);
      const isPast = date < today;
      try {
        const cached = JSON.parse(localStorage.getItem(key) || 'null');
        if (cached && cached.code != null && (isPast || now - (cached.ts || 0) < WX_TTL_FUTURE)) return cached;
      } catch {}
      try {
        const baseUrl = isPast ? 'https://archive-api.open-meteo.com/v1/archive' : 'https://api.open-meteo.com/v1/forecast';
        const url = `${baseUrl}?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min,weather_code&start_date=${date}&end_date=${date}&temperature_unit=fahrenheit&timezone=auto`;
        const res = await fetch(url);
        const json = await res.json();
        const t = json?.daily;
        if (!t || t.temperature_2m_max?.[0] == null) return null;
        const data = {
          tmax: Math.round(t.temperature_2m_max[0]),
          tmin: Math.round(t.temperature_2m_min[0]),
          code: t.weather_code?.[0] ?? 0,
          ts: now
        };
        try { localStorage.setItem(key, JSON.stringify(data)); } catch {}
        return data;
      } catch { return null; }
    }

    function weatherEmoji(code) {
      if (code === 0) return '☀️';
      if (code === 1 || code === 2) return '🌤️';
      if (code === 3) return '☁️';
      if (code === 45 || code === 48) return '🌫️';
      if (code >= 51 && code <= 57) return '🌦️';
      if (code >= 61 && code <= 67) return '🌧️';
      if (code >= 71 && code <= 77) return '🌨️';
      if (code >= 80 && code <= 82) return '🌦️';
      if (code === 85 || code === 86) return '❄️';
      if (code >= 95 && code <= 99) return '⛈️';
      return '🌡️';
    }

    function DayWeather({ city, date }) {
      const [wx, setWx] = useState(null);
      useEffect(() => {
        if (!city || !date) { setWx(null); return; }
        let cancelled = false;
        (async () => {
          const geo = await geocodeCity(city);
          if (cancelled || !geo) return;
          const w = await fetchWeather(geo.lat, geo.lon, date);
          if (!cancelled) setWx(w);
        })();
        return () => { cancelled = true; };
      }, [city, date]);
      if (!city || !date || !wx) return null;
      return (
        <span className="text-[10px] font-data text-3 flex items-center gap-0.5 shrink-0" title={`Forecast for ${date}`}>
          <span className="text-xs">{weatherEmoji(wx.code)}</span>
          <span><b className="text-1">{wx.tmax}°</b><span className="text-5">/</span>{wx.tmin}°</span>
        </span>
      );
    }

    function calcSuggestedDeduction(itemInv, unitsPerBox, mode) {
      if (mode === 'custom') return 0;
      const inv = itemInv || {};
      const starting = parseInt(inv.starting) || 0;
      const restocks = (inv.restocks || []).reduce((s, r) => s + (parseInt(r.amount) || 0), 0);
      const leftover = inv.leftover;
      let units = 0;
      if (mode === 'given_out') {
        if (leftover === null || leftover === undefined) return 0;
        units = Math.max(0, starting + restocks - (parseInt(leftover) || 0));
      } else if (mode === 'pulled') {
        units = starting + restocks;
      }
      return Math.floor(units / Math.max(1, unitsPerBox));
    }

    async function sget(key, fb) { try { const v = localStorage.getItem('tracker:' + key); if (v === null) return fb; return JSON.parse(v); } catch { return fb; }}
    async function sset(key, v) { try { localStorage.setItem('tracker:' + key, JSON.stringify(v)); } catch (e) { console.error(e); }}
    async function sdel(key) { try { localStorage.removeItem('tracker:' + key); } catch {} }

    function findItem(library, name) { return library.find(i => i.name === name); }
    function getEmoji(library, name) { return findItem(library, name)?.emoji || smartEmoji(name); }

    // === MIGRATION ===
    async function migrate() {
      // 1. Items library: string[] -> {name, emoji}[] (legacy safety)
      const items = await sget('items', null);
      if (items && items.length > 0 && typeof items[0] === 'string') {
        const upgraded = items.map(name => ({ name, emoji: smartEmoji(name) }));
        await sset('items', upgraded);
      }
      // 2. Ensure events array exists
      const events = await sget('events', null);
      if (!events) {
        await sset('events', []);
      }

    function ThemeToggle() {

    // === APP ===
    function App() {
      const [screen, setScreen] = useState('home');
      const [currentEventId, setCurrentEventId] = useState(null);
      const [currentDayId, setCurrentDayId] = useState(null);
      const [events, setEvents] = useState([]);
      const [daysIndex, setDaysIndex] = useState([]);

      const [tourName, setTourName] = useState('');
      const [theme, setTheme] = useState('dark');
      const [showWelcome, setShowWelcome] = useState(false);
      const [showInfo, setShowInfo] = useState(false);
      const [loading, setLoading] = useState(true);
      const [toast, setToast] = useState(null);

      useEffect(() => { (async () => {
        await migrate();
        let items = await sget('items', null);
        if (!items) { items = DEFAULT_ITEMS; await sset('items', items); }
        setItemsLibrary(items);
        const sm = await sget('stock', {});
        setStockMap(sm);
        const tn = await sget('tourName', '');
        setTourName(tn || '');
        const ev = await sget('events', []);
        const idx = await sget('idx', []);
        setEvents(ev);
        setDaysIndex(idx);
        const savedTheme = await sget('theme', 'dark');
        setTheme(savedTheme);
        const w = await sget('welcomed', null);
        // Existing users: mark as welcomed silently. New users: show welcome.
        if (w === null) {
          if (ev.length > 0 || idx.length > 0) {
            await sset('welcomed', true);
          } else {
            setShowWelcome(true);
          }
        }
        setLoading(false);
      })(); }, []);

      // === BROWSER BACK BUTTON (History API) ===
      const navBackRef = useRef(false);
      const navMountedRef = useRef(false);

      // Sync screen changes into browser history
      useEffect(() => {
        if (loading) return;
        const state = { screen, currentEventId, currentDayId, _app: 'tracker' };
        if (!navMountedRef.current) {
          navMountedRef.current = true;
          window.history.replaceState(state, '');
          return;
        }
        if (navBackRef.current) {
          navBackRef.current = false;
          return;
        }
        window.history.pushState(state, '');
      }, [screen, currentEventId, currentDayId, loading]);

      // Listen for browser back/forward
      useEffect(() => {
        const handlePop = async (e) => {
          if (showInfo) { setShowInfo(false); window.history.pushState({ screen, currentEventId, currentDayId, _app: 'tracker' }, ''); return; }
          if (showWelcome) { setShowWelcome(false); window.history.pushState({ screen, currentEventId, currentDayId, _app: 'tracker' }, ''); return; }
          const st = e.state;
          if (!st || st._app !== 'tracker') {
            return;
          }
          navBackRef.current = true;
          setCurrentEventId(st.currentEventId ?? null);
          setCurrentDayId(st.currentDayId ?? null);
          if ((st.screen === 'day' || st.screen === 'export') && st.currentDayId) {
            const d = await sget(`d:${st.currentDayId}`, null);
            if (d) setCurrentDay(d);
          } else {
            setCurrentDay(null);
          }
          setScreen(st.screen || 'home');
        };
        window.addEventListener('popstate', handlePop);
        return () => window.removeEventListener('popstate', handlePop);
      }, [screen, currentEventId, currentDayId, showInfo, showWelcome]);

      const toggleTheme = async () => {
        const order = ['light', 'dark', 'ocean'];
        const next = order[(order.indexOf(theme) + 1) % order.length];
        setTheme(next);
        await sset('theme', next);
      };

      const showToast = (m) => { setToast(m); setTimeout(() => setToast(null), 2000); };

      const createEvent = async (name, city, monthYear) => {
        const ev = { id: newId('e'), name: name.trim() || 'Untitled', city: city?.trim() || null, monthYear: monthYear || null, createdAt: new Date().toISOString() };
        const next = [ev, ...events];
        setEvents(next);
        await sset('events', next);
        setCurrentEventId(ev.id);
        setScreen('event');
        showToast(`📁 ${ev.name} created`);
      };
      const renameEvent = async (id, name, city, monthYear) => {
        const next = events.map(e => e.id === id ? { ...e, name: name.trim() || e.name, city: city?.trim() || null, monthYear: monthYear || null } : e);
        setEvents(next);
        await sset('events', next);
        const ev = next.find(e => e.id === id);
        const newIdx = daysIndex.map(d => d.eventId === id ? { ...d, eventName: ev.name } : d);
        setDaysIndex(newIdx);
        await sset('idx', newIdx);
      };
      const deleteEvent = async (id) => {
        const daysToDelete = daysIndex.filter(d => d.eventId === id);
        for (const d of daysToDelete) await sdel(`d:${d.id}`);
        const newIdx = daysIndex.filter(d => d.eventId !== id);
        const next = events.filter(e => e.id !== id);
        setEvents(next); setDaysIndex(newIdx);
        await sset('events', next);
        await sset('idx', newIdx);
        setScreen('home');
        setCurrentEventId(null);
        showToast('🗑️ Event deleted');
      };
      const openEvent = (id) => { setCurrentEventId(id); setScreen('event'); };

      const openDay = async (id) => {
        const d = await sget(`d:${id}`, null);
        if (d) { setCurrentDay(d); setCurrentDayId(id); setScreen('day'); }
      };

      const createDay = async (eventId) => {
        const ev = events.find(e => e.id === eventId);
        const eventDays = daysIndex.filter(d => d.eventId === eventId);
        const lastInEvent = eventDays[0];
        const id = newId('d');
        const startingItems = lastInEvent
          ? (lastInEvent.activeItems || itemsLibrary.slice(0, 2).map(i => i.name))
          : itemsLibrary.slice(0, 2).map(i => i.name);
        const day = {
          id, eventId,
          eventName: ev?.name || '',
          weekNum: lastInEvent?.weekNum || 1,
          dayNum: lastInEvent ? lastInEvent.dayNum + 1 : 1,
          date: todayISO(),
          status: 'active',
          createdAt: new Date().toISOString(),
          closedAt: null,
          activeItems: startingItems,
          inventory: {}
        };
        day.activeItems.forEach(n => { day.inventory[n] = { starting: 0, restocks: [], leftover: null }; });
        await sset(`d:${id}`, day);
        const idxEntry = { id, eventId, eventName: day.eventName, weekNum: day.weekNum, dayNum: day.dayNum, date: day.date, status: 'active', dayTotal: 0, activeItems: day.activeItems };
        const newIdx = [idxEntry, ...daysIndex];
        await sset('idx', newIdx);
        setDaysIndex(newIdx); setCurrentDay(day); setCurrentDayId(id); setScreen('day');
      };

      const saveDay = async (updated) => {
        setCurrentDay(updated);
        await sset(`d:${updated.id}`, updated);
        const dayTotal = Object.values(updated.inventory).reduce((s, v) => {
          const start = (v.starting || 0) + (v.restocks || []).reduce((a,r) => a + (r.amount||0), 0);
          if (v.leftover === null || v.leftover === undefined) return s;
          return s + Math.max(0, start - v.leftover);
        }, 0);
        const newIdx = daysIndex.map(d => d.id === updated.id
          ? { ...d, eventId: updated.eventId, eventName: updated.eventName, weekNum: updated.weekNum, dayNum: updated.dayNum, date: updated.date, status: updated.status, dayTotal, activeItems: updated.activeItems }
          : d);
        await sset('idx', newIdx);
        setDaysIndex(newIdx);
      };

      const deleteDay = async (id) => {
        await sdel(`d:${id}`);
        const newIdx = daysIndex.filter(d => d.id !== id);
        await sset('idx', newIdx);
        setDaysIndex(newIdx);
        if (currentDayId === id) {
          setCurrentDay(null); setCurrentDayId(null);
          setScreen(currentEventId ? 'event' : 'home');
        }
        showToast('🗑️ Day deleted');
      };

      const moveDayTo = async (dayId, targetDayId, position) => {
        // position: 'before' | 'after' — move dayId to be before/after targetDayId
        if (!dayId || !targetDayId || dayId === targetDayId) return;
        const dayIdx = daysIndex.findIndex(d => d.id === dayId);
        if (dayIdx === -1) return;
        const filtered = daysIndex.filter(d => d.id !== dayId);
        const targetIdx = filtered.findIndex(d => d.id === targetDayId);
        if (targetIdx === -1) return;
        const insertIdx = position === 'before' ? targetIdx : targetIdx + 1;
        const newIdx = [...filtered.slice(0, insertIdx), daysIndex[dayIdx], ...filtered.slice(insertIdx)];
        await sset('idx', newIdx);
        setDaysIndex(newIdx);
      };

      const updateLibrary = async (next) => {
        // Smart sync with stockMap on rename/delete
        const nextNames = new Set(next.map(i => i.name));
        let updatedStock = null;
        if (next.length === itemsLibrary.length) {
          for (let i = 0; i < next.length; i++) {
            if (next[i].name !== itemsLibrary[i].name && stockMap[itemsLibrary[i].name]) {
              if (!updatedStock) updatedStock = { ...stockMap };
              updatedStock[next[i].name] = updatedStock[itemsLibrary[i].name];
              delete updatedStock[itemsLibrary[i].name];
            }
          }
        } else if (next.length < itemsLibrary.length) {
          const removed = itemsLibrary.filter(i => !nextNames.has(i.name));
          if (removed.some(r => stockMap[r.name])) {
            updatedStock = { ...stockMap };
            removed.forEach(r => delete updatedStock[r.name]);
          }
        }
        if (updatedStock) {
          setStockMap(updatedStock);
          await sset('stock', updatedStock);
        }
        setItemsLibrary(next);
        await sset('items', next);
      };

      const updateStock = async (next) => {
        setStockMap(next);
        await sset('stock', next);
      };

      const updateTourName = async (name) => {
        setTourName(name);
        await sset('tourName', name);
      };

      const setItemStockSettings = async (itemName, patch) => {
        const current = stockMap[itemName] || { boxes: 0, unitsPerBox: 1, threshold: 0, notes: '', history: [] };
        const next = { ...stockMap, [itemName]: { ...current, ...patch } };
        await updateStock(next);
      };

      const updateStockHistory = async (itemName, newHistory) => {
        const current = stockMap[itemName];
        if (!current) return;
        const next = { ...stockMap, [itemName]: { ...current, history: newHistory } };
        await updateStock(next);
      };

      const changeStock = async (itemName, type, boxes, note) => {
        const current = stockMap[itemName] || { boxes: 0, unitsPerBox: 1, threshold: 0, notes: '', history: [] };
        let delta = 0;
        if (type === 'restock' || type === 'adjust-add' || type === 'sync-undo') delta = boxes;
        else if (type === 'use' || type === 'adjust-sub' || type === 'auto-deduct') delta = -boxes;
        const newBoxes = Math.max(0, current.boxes + delta);
        const entry = { ts: new Date().toISOString(), type, boxes, note: note || null };
        const lastRestockedAt = type === 'restock' ? entry.ts : current.lastRestockedAt;
        const next = {
          ...stockMap,
          [itemName]: {
            ...current,
            boxes: newBoxes,
            lastRestockedAt,
            history: [entry, ...(current.history || [])].slice(0, 50)
          }
        };
        await updateStock(next);
      };

      const applyStockSync = async (day, mode, deductions) => {
        let nextMap = { ...stockMap };
        const reverseIfNeeded = () => {
          if (!day.stockSync) return;
          const undoNote = `Re-sync Day ${day.dayNum} · reverse`;
          for (const [name, boxes] of Object.entries(day.stockSync.deductions || {})) {
            if (!boxes || boxes <= 0) continue;
            const cur = nextMap[name] || { boxes: 0, unitsPerBox: 1, threshold: 0, notes: '', history: [] };
            const entry = { ts: new Date().toISOString(), type: 'sync-undo', boxes, note: undoNote };
            nextMap[name] = { ...cur, boxes: cur.boxes + boxes, history: [entry, ...(cur.history || [])].slice(0, 50) };
          }
        };
        reverseIfNeeded();
        const ts = new Date().toISOString();
        const modeLabel = mode === 'given_out' ? 'given out' : mode === 'pulled' ? 'pulled' : 'custom';
        const noteBase = `Day ${day.dayNum} sync (${modeLabel})`;
        for (const [name, boxes] of Object.entries(deductions)) {
          if (!boxes || boxes <= 0) continue;
          const cur = nextMap[name] || { boxes: 0, unitsPerBox: 1, threshold: 0, notes: '', history: [] };
          const newBoxes = Math.max(0, cur.boxes - boxes);
          const entry = { ts, type: 'auto-deduct', boxes, note: noteBase };
          nextMap[name] = { ...cur, boxes: newBoxes, history: [entry, ...(cur.history || [])].slice(0, 50) };
        }
        await updateStock(nextMap);
        const cleanDeductions = {};
        for (const [k, v] of Object.entries(deductions)) {
          if (v && v > 0) cleanDeductions[k] = v;
        }
        await saveDay({ ...day, stockSync: { ts, mode, deductions: cleanDeductions } });
      };

      const undoStockSync = async (day) => {
        if (!day.stockSync) return;
        let nextMap = { ...stockMap };
        const ts = new Date().toISOString();
        const noteBase = `Undo Day ${day.dayNum} sync`;
        for (const [name, boxes] of Object.entries(day.stockSync.deductions || {})) {
          if (!boxes || boxes <= 0) continue;
          const cur = nextMap[name] || { boxes: 0, unitsPerBox: 1, threshold: 0, notes: '', history: [] };
          const entry = { ts, type: 'sync-undo', boxes, note: noteBase };
          nextMap[name] = { ...cur, boxes: cur.boxes + boxes, history: [entry, ...(cur.history || [])].slice(0, 50) };
        }
        await updateStock(nextMap);
        const { stockSync, ...rest } = day;
        await saveDay(rest);
      };

      const exportData = async (eventIds) => {
        const idSet = eventIds && eventIds.length > 0 ? new Set(eventIds) : null;
        const exportEvents = idSet ? events.filter(e => idSet.has(e.id)) : events;
        const exportEventIds = new Set(exportEvents.map(e => e.id));
        const exportIdx = daysIndex.filter(d => exportEventIds.has(d.eventId));
        const days = {};
        for (const di of exportIdx) {
          const day = await sget(`d:${di.id}`, null);
          if (day) days[di.id] = day;
        }
        return {
          version: 1,
          app: 'tracker',
          exportedAt: new Date().toISOString(),
          scope: idSet ? 'events' : 'all',
          tourName,
          events: exportEvents,
          daysIndex: exportIdx,
          itemsLibrary,
          stockMap,
          days

      };

      const importData = async (incoming, mode) => {

          keys.forEach(k => localStorage.removeItem(k));
          const newEvents = incoming.events || [];
          const newIdx = incoming.daysIndex || [];
          const newItems = incoming.itemsLibrary || DEFAULT_ITEMS;
          const newStock = incoming.stockMap || {};
          const newTourName = incoming.tourName || '';
          await sset('events', newEvents);
          await sset('idx', newIdx);
          await sset('items', newItems);
          await sset('stock', newStock);
          await sset('tourName', newTourName);
          for (const [id, day] of Object.entries(incoming.days || {})) {
            await sset(`d:${id}`, day);
          }
          setEvents(newEvents); setDaysIndex(newIdx); setItemsLibrary(newItems); setStockMap(newStock); setTourName(newTourName);

          await sset('idx', newIdx);
          await sset('items', newItems);
          await sset('stock', mergedStock);
          if (!tourName && mergedTourName) await sset('tourName', mergedTourName);
          setEvents(newEvents); setDaysIndex(newIdx); setItemsLibrary(newItems); setStockMap(mergedStock);
