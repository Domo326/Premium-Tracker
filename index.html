      const [showCreate, setShowCreate] = useState(false);
      const [editingEvent, setEditingEvent] = useState(null);
      const activeEvents = events.filter(e => daysIndex.some(d => d.eventId === e.id && d.status === 'active')).length;
      const totalDays = daysIndex.length;
      const lowStockCount = (itemsLibrary || []).filter(item => {
        const s = (stockMap || {})[item.name];
        return s && s.threshold > 0 && s.boxes <= s.threshold;
      }).length;
      const trackedCount = (itemsLibrary || []).filter(item => {
        const s = (stockMap || {})[item.name];
        return s && (s.boxes > 0 || s.threshold > 0);
      }).length;

      return (
        <div className="max-w-2xl mx-auto px-4 pt-5 pb-32">
          <div className="flex items-center justify-between mb-4">
            <div className="min-w-0 flex-1">
              <div className="text-[10px] font-data uppercase tracking-[0.25em] text-accent font-bold flex items-center gap-1">🎁 Tour Inventory</div>
              <h1 className="font-display text-2xl font-extrabold leading-tight text-1 flex items-center gap-1.5">Premium<span className="text-accent">.</span></h1>
              {tourName && (
                <div className="text-[11px] font-data text-2 mt-1 flex items-center gap-1 truncate">
                  <span className="text-3">🏷️</span>
                  <b className="text-1 truncate">{tourName}</b>
                </div>
              )}
            </div>
            <div className="flex items-center gap-1.5 shrink-0">
              <InfoButton onClick={onInfo} />
              <ThemeToggle />
              <button onClick={onStock} className="p-2 rounded-lg bg-surface border border-line active:scale-95 relative" aria-label="Stock">
                <span className="text-base">📦</span>
                {lowStockCount > 0 && <span className="absolute -top-1 -right-1 w-4 h-4 rounded-full bg-danger text-[9px] font-data font-bold flex items-center justify-center">{lowStockCount}</span>}
              </button>
              <button onClick={onLibrary} className="p-2 rounded-lg bg-surface border border-line active:scale-95" aria-label="Settings">
                <Settings className="w-4 h-4 text-3" />
              </button>
            </div>
          </div>

          <div className="flex items-center gap-3 text-xs font-data mb-4 px-1 flex-wrap">
            <span><span className="text-4">Events</span> <b className="text-1">{events.length}</b></span>
            <span className="text-5">·</span>
            <span><span className="text-4">Active</span> <b className="text-accent">{activeEvents}</b></span>
            <span className="text-5">·</span>
            <span><span className="text-4">Days</span> <b className="text-amber">{totalDays}</b></span>
            {trackedCount > 0 && (
              <>
                <span className="text-5">·</span>
                <span><span className="text-4">Stock</span> <b className="text-1">{trackedCount}</b></span>
              </>
            )}
          </div>

          <button onClick={() => setShowCreate(true)} className="w-full mb-4 bg-inverse font-bold py-3 rounded-xl flex items-center justify-center gap-1.5 active:scale-[0.98]">
            <Plus className="w-4 h-4" strokeWidth={3} />
            <span className="font-display text-base">New Event</span>
          </button>

          {events.length === 0 ? (
            <div className="text-center py-12 border border-dashed border-line rounded-xl">
              <div className="text-3xl mb-1">📁</div>
              <p className="text-sm text-3">Tap <b className="text-accent">New Event</b> to start your tour</p>
              <p className="text-xs text-4 mt-2">e.g. "LA County Fair"</p>
            </div>
          ) : (
            <div className="space-y-2">
              {events.map(ev => (
                <EventCard key={ev.id} event={ev} daysIndex={daysIndex} onClick={() => onOpenEvent(ev.id)} onEdit={() => setEditingEvent(ev)} onDelete={() => onDeleteEvent(ev.id)} />
              ))}
            </div>
          )}

          {showCreate && (
            <EventEditModal title="New Event" onClose={() => setShowCreate(false)} onSave={(n, c, m) => { onCreateEvent(n, c, m); setShowCreate(false); }} />
          )}
          {editingEvent && (
            <EventEditModal title="Edit Event" initial={editingEvent} onClose={() => setEditingEvent(null)} onSave={(n, c, m) => { onRenameEvent(editingEvent.id, n, c, m); setEditingEvent(null); }} />
          )}
        </div>
      );
    }

    function EventCard({ event, daysIndex, onClick, onEdit, onDelete }) {
      const [confirming, setConfirming] = useState(false);
      const myDays = daysIndex.filter(d => d.eventId === event.id);
      const activeDays = myDays.filter(d => d.status === 'active').length;
      const totalOut = myDays.reduce((s, d) => s + (d.dayTotal || 0), 0);

      return (
        <div className="bg-surface border border-line rounded-xl overflow-hidden fade-in">
          <div className="px-3 py-3 flex items-center gap-3">
            <button type="button" onClick={onClick} className="flex-1 flex items-center gap-3 min-w-0 text-left active:opacity-60">
              <div className="text-2xl shrink-0">{eventEmoji(event)}</div>
              <div className="flex-1 min-w-0">
                <div className="flex items-center gap-1.5 min-w-0">
                  <span className="font-display font-extrabold text-base truncate text-1">{event.name}</span>
                  {event.monthYear && (
                    <span className="text-[9px] font-data font-bold text-3 px-1.5 py-0.5 rounded bg-surface-2 border border-line shrink-0">{monthYearShort(event.monthYear)}</span>
                  )}
                </div>
                {event.city && (
                  <div className="text-[11px] text-3 font-data flex items-center gap-0.5 truncate">
                    <MapPin className="w-3 h-3" strokeWidth={2} /> {event.city}
                  </div>
                )}
                <div className="text-[11px] text-3 font-data mt-0.5">
                  {myDays.length} day{myDays.length !== 1 ? 's' : ''}
                  {activeDays > 0 && <span className="text-accent"> · {activeDays} live</span>}
                  {totalOut > 0 && <span className="text-amber"> · {totalOut} out</span>}
                </div>
              </div>
            </button>
            <div className="flex items-center gap-0.5 shrink-0">
              {confirming ? (
                <div className="flex flex-col gap-1 items-end">
                  <div className="text-[10px] text-danger font-bold leading-tight text-right">Delete event<br/>+ {myDays.length} day{myDays.length !== 1 ? 's' : ''}?</div>
                  <div className="flex gap-1">
                    <button onClick={onDelete} className="px-2 py-0.5 bg-danger rounded text-[10px] font-bold">DELETE</button>
                    <button onClick={() => setConfirming(false)} className="p-0.5 text-4"><X className="w-3 h-3" /></button>
                  </div>
                </div>
              ) : (
                <>
                  <button onClick={onEdit} className="p-1.5 text-4 hover:text-accent" aria-label="Edit"><Edit3 className="w-3.5 h-3.5" /></button>
                  <button onClick={() => setConfirming(true)} className="p-1.5 text-4 hover:text-danger" aria-label="Delete"><Trash2 className="w-3.5 h-3.5" /></button>
                  <button onClick={onClick} className="p-1 text-5 active:opacity-60"><ChevronRight className="w-4 h-4" /></button>
                </>
              )}
            </div>
          </div>
        </div>
      );
    }

    function EventEditModal({ title, initial, onClose, onSave }) {
      const [name, setName] = useState(initial?.name || '');
      const [city, setCity] = useState(initial?.city || '');
      const [monthYear, setMonthYear] = useState(initial?.monthYear || '');
      return (
        <Modal onClose={onClose}>
          <h3 className="font-display text-lg font-bold mb-3 text-1">{title}</h3>
          <div className="space-y-2 mb-4">
            <label className="block">
              <span className="text-[10px] uppercase tracking-widest text-3 font-data font-bold">Event Name</span>
              <input autoFocus value={name} onChange={e => setName(e.target.value)} placeholder="e.g. LA County Fair" className="input mt-0.5 w-full rounded-md px-3 py-2 text-sm placeholder-mute" />
            </label>
            <label className="block">
              <span className="text-[10px] uppercase tracking-widest text-3 font-data font-bold">City <span className="text-4 normal-case tracking-normal">(optional)</span></span>
              <input value={city} onChange={e => setCity(e.target.value)} placeholder="e.g. Los Angeles, CA" className="input mt-0.5 w-full rounded-md px-3 py-2 text-sm placeholder-mute" />
            </label>
            <label className="block">
              <span className="text-[10px] uppercase tracking-widest text-3 font-data font-bold">Month/Year <span className="text-4 normal-case tracking-normal">(optional)</span></span>
              <input type="month" value={monthYear} onChange={e => setMonthYear(e.target.value)} className="input mt-0.5 w-full rounded-md px-3 py-2 text-sm placeholder-mute" />
              {monthYear && <div className="text-[10px] text-3 font-data mt-1">→ Displays as <b className="text-accent">{monthYearShort(monthYear)}</b></div>}
            </label>
          </div>
          <div className="flex gap-2">
            <button onClick={onClose} className="flex-1 bg-surface-2 text-2 font-semibold py-2 rounded-md text-sm border border-line">Cancel</button>
            <button onClick={() => name.trim() && onSave(name, city, monthYear)} disabled={!name.trim()} className="flex-1 bg-inverse font-bold py-2 rounded-md text-sm disabled:opacity-50">Save</button>
          </div>
        </Modal>
      );
    }

    // === EVENT DETAIL ===
    function EventDetail({ event, eventDays, onBack, onOpenDay, onCreateDay, onDeleteDay, onMoveDayTo, onRenameEvent, onDeleteEvent, onInfo }) {
      const [editing, setEditing] = useState(false);
      const [confirmDelete, setConfirmDelete] = useState(false);
      const [sortMode, setSortMode] = useState(() => {
        try { return localStorage.getItem('tracker:sortMode') || 'day'; } catch { return 'day'; }
      });
      const [draggingId, setDraggingId] = useState(null);
      useEffect(() => {
        try { localStorage.setItem('tracker:sortMode', sortMode); } catch {}
      }, [sortMode]);
      const activeCount = eventDays.filter(d => d.status === 'active').length;
      const totalOut = eventDays.reduce((s, d) => s + (d.dayTotal || 0), 0);

      const sortedDays = useMemo(() => {
        const arr = [...eventDays];
        if (sortMode === 'day') return arr.sort((a, b) => ((a.weekNum||0)*100 + (a.dayNum||0)) - ((b.weekNum||0)*100 + (b.dayNum||0)));
        if (sortMode === 'recent') return arr.sort((a, b) => (b.id || '').localeCompare(a.id || ''));
        return arr;
      }, [eventDays, sortMode]);

      const pillCls = (m) => `flex-1 text-[10px] font-data font-bold py-1.5 rounded-md transition active:scale-95 ${sortMode === m ? 'bg-accent-soft text-1 border border-accent' : 'bg-surface-2 text-3 border border-line'}`;

      // === Drag-and-drop handlers ===
      const handleDragStart = (e, dayId) => {
        e.preventDefault();
        setDraggingId(dayId);
        try { e.target.setPointerCapture(e.pointerId); } catch {}
      };
      const handleDragMove = (e) => {
        if (!draggingId) return;
        const el = document.elementFromPoint(e.clientX, e.clientY);
        if (!el) return;
        const row = el.closest('[data-dayid]');
        if (!row) return;
        const overId = row.dataset.dayid;
        if (!overId || overId === draggingId) return;
        const rect = row.getBoundingClientRect();
        const position = e.clientY < rect.top + rect.height / 2 ? 'before' : 'after';
        onMoveDayTo(draggingId, overId, position);
      };
      const handleDragEnd = (e) => {
        setDraggingId(null);
        try { e.target.releasePointerCapture(e.pointerId); } catch {}
      };

      return (
        <div className="max-w-2xl mx-auto px-4 pt-4 pb-32">
          <div className="flex items-center justify-between mb-3">
            <button onClick={onBack} className="flex items-center gap-1 text-3 active:scale-95">
              <ChevronLeft className="w-4 h-4" /><span className="text-xs">Home</span>
            </button>
            <div className="flex items-center gap-1.5">
              <InfoButton onClick={onInfo} />
              <ThemeToggle />
            </div>
          </div>

          <div className="mb-4">
            <div className="flex items-start gap-2 mb-1">
              <div className="text-3xl">{eventEmoji(event)}</div>
              <div className="flex-1 min-w-0">
                <div className="flex items-center gap-2 flex-wrap">
                  <h1 className="font-display text-2xl font-extrabold leading-tight text-1 truncate">{event.name}</h1>
                  {event.monthYear && (
                    <span className="text-[10px] font-data font-bold text-2 px-1.5 py-0.5 rounded bg-surface-2 border border-line shrink-0">{monthYearShort(event.monthYear)}</span>
                  )}
                </div>
                {event.city && (
                  <div className="text-xs text-3 font-data flex items-center gap-1">
                    <MapPin className="w-3 h-3" /> {event.city}
                  </div>
                )}
              </div>
              <button onClick={() => setEditing(true)} className="p-1.5 text-4 hover:text-accent" aria-label="Edit event">
                <Edit3 className="w-4 h-4" />
              </button>
            </div>

            <div className="flex items-center gap-3 text-xs font-data px-1 mt-2">
              <span><span className="text-4">Days</span> <b className="text-1">{eventDays.length}</b></span>
              <span className="text-5">·</span>
              <span><span className="text-4">Active</span> <b className="text-accent">{activeCount}</b></span>
              <span className="text-5">·</span>
              <span><span className="text-4">Out</span> <b className="text-amber">{totalOut.toLocaleString()}</b></span>
            </div>
          </div>

          <button onClick={onCreateDay} className="w-full mb-4 bg-inverse font-bold py-3 rounded-xl flex items-center justify-center gap-1.5 active:scale-[0.98]">
            <Plus className="w-4 h-4" strokeWidth={3} />
            <span className="font-display text-base">New Day</span>
          </button>

          {eventDays.length === 0 ? (
            <div className="text-center py-10 border border-dashed border-line rounded-xl">
              <div className="text-3xl mb-1">📋</div>
              <p className="text-sm text-3">Tap <b className="text-accent">New Day</b> to start tracking</p>
            </div>
          ) : (
            <>
              <div className="flex items-center gap-1 mb-2">
                <span className="text-[9px] uppercase tracking-widest text-4 font-data font-bold mr-1 shrink-0">Sort</span>
                <button onClick={() => setSortMode('day')} className={pillCls('day')}>🔢 Day#</button>
                <button onClick={() => setSortMode('recent')} className={pillCls('recent')}>🕐 Recent</button>
                <button onClick={() => setSortMode('manual')} className={pillCls('manual')}>✋ Custom</button>
              </div>
              <div className="bg-surface border border-line rounded-xl overflow-hidden divide-line">
                {sortedDays.map((d, i) => (
                  <DayRow
                    key={d.id}
                    day={d}
                    city={event.city}
                    onClick={() => onOpenDay(d.id)}
                    onDelete={() => onDeleteDay(d.id)}
                    showDrag={sortMode === 'manual'}
                    isDragging={draggingId === d.id}
                    onDragStart={(e) => handleDragStart(e, d.id)}
                    onDragMove={handleDragMove}
                    onDragEnd={handleDragEnd}
                  />
                ))}
              </div>
            </>
          )}

          <div className="mt-8">
            {confirmDelete ? (
              <div className="bg-danger-soft border border-danger rounded-lg p-3 fade-in">
                <p className="text-xs text-danger font-bold mb-2">⚠️ This deletes the event AND all {eventDays.length} day{eventDays.length !== 1 ? 's' : ''} inside it. Cannot be undone.</p>
                <div className="flex gap-2">
                  <button onClick={() => setConfirmDelete(false)} className="flex-1 bg-surface text-2 font-semibold py-2 rounded-md text-xs border border-line">Cancel</button>
                  <button onClick={onDeleteEvent} className="flex-1 bg-danger font-bold py-2 rounded-md text-xs">Delete Everything</button>
                </div>
              </div>
            ) : (
              <button onClick={() => setConfirmDelete(true)} className="w-full text-3 text-xs flex items-center justify-center gap-1 py-2 hover:text-danger">
                <Trash2 className="w-3 h-3" /> Delete this event
              </button>
            )}
          </div>

          {editing && (
            <EventEditModal title="Edit Event" initial={event} onClose={() => setEditing(false)} onSave={(n, c, m) => { onRenameEvent(n, c, m); setEditing(false); }} />
          )}
        </div>
      );
    }

    function DayRow({ day, city, onClick, onDelete, showDrag, isDragging, onDragStart, onDragMove, onDragEnd }) {
      const [confirming, setConfirming] = useState(false);
      return (
        <div data-dayid={day.id} className={`px-3 py-2.5 flex items-center gap-2 fade-in transition ${isDragging ? 'bg-accent-soft ring-2 ring-accent shadow-xl relative z-10 scale-[1.02]' : ''}`}>
          {showDrag && (
            <button
              type="button"
              onPointerDown={onDragStart}
              onPointerMove={onDragMove}
              onPointerUp={onDragEnd}
              onPointerCancel={onDragEnd}
              className="p-1.5 -ml-1 text-3 active:text-accent cursor-grab touch-none select-none"
              aria-label="Drag to reorder"
              style={{ touchAction: 'none' }}
            >
              <Grip className="w-4 h-4" />
            </button>
          )}
          <button type="button" onClick={onClick} className="flex-1 flex items-center gap-2.5 min-w-0 text-left active:opacity-60">
            <span className={`text-[9px] uppercase tracking-widest font-data font-bold px-1.5 py-0.5 rounded shrink-0 ${day.status === 'active' ? 'bg-accent-soft' : 'bg-status-closed'}`}>
              {day.status === 'active' ? 'LIVE' : 'CLOSED'}
            </span>
            <div className="flex-1 min-w-0">
              <div className="flex items-center justify-between gap-2">
                <div className="font-display font-bold text-sm leading-tight text-1 truncate">
                  Week {day.weekNum} · Day {day.dayNum}
                </div>
                <DayWeather city={city} date={day.date} />
              </div>
              <div className="text-[11px] text-3 font-data leading-tight">{dateNice(day.date)}{day.status === 'closed' ? ` · ${day.dayTotal || 0} out` : ''}</div>
            </div>
          </button>
          {confirming ? (
            <div className="flex gap-1 shrink-0">
              <button type="button" onClick={onDelete} className="px-1.5 py-0.5 bg-danger rounded text-[10px] font-bold">Del</button>
              <button type="button" onClick={() => setConfirming(false)} className="p-0.5 text-4"><X className="w-3 h-3" /></button>
            </div>
          ) : (
            <div className="flex items-center gap-0.5 shrink-0">
              <button type="button" onClick={() => setConfirming(true)} className="p-1 text-4 hover:text-danger"><Trash2 className="w-3.5 h-3.5" /></button>
              <button type="button" onClick={onClick} className="p-0.5 text-5 active:opacity-60"><ChevronRight className="w-4 h-4" /></button>
            </div>
          )}
        </div>
      );
    }

    // === DAY DETAIL ===
    function DayDetail({ day, event, itemsLibrary, stockMap, onSave, onBack, onExport, onInfo, onApplyStockSync, onUndoStockSync, showToast }) {
      const [editHeader, setEditHeader] = useState(false);
      const [showCloseConfirm, setShowCloseConfirm] = useState(false);
      const [showSyncModal, setShowSyncModal] = useState(false);
      const [showUndoConfirm, setShowUndoConfirm] = useState(false);
      const update = (patch) => onSave({ ...day, ...patch });
      const isClosed = day.status === 'closed';
      const closeDay = async () => { await onSave({ ...day, status: 'closed', closedAt: new Date().toISOString() }); setShowCloseConfirm(false); showToast('🔒 Closed'); };
      const reopenDay = async () => { await onSave({ ...day, status: 'active', closedAt: null }); showToast('🔓 Reopened'); };
      const dayTotal = Object.values(day.inventory).reduce((s, v) => {
        const start = (v.starting || 0) + (v.restocks || []).reduce((a,r) => a + (r.amount||0), 0);
        if (v.leftover === null || v.leftover === undefined) return s;
        return s + Math.max(0, start - v.leftover);
      }, 0);

      return (
        <div className="max-w-2xl mx-auto px-3 pt-3 pb-32">
          <div className="flex items-center justify-between mb-2.5">
            <button onClick={onBack} className="flex items-center gap-1 text-3 active:scale-95">
              <ChevronLeft className="w-4 h-4" />
              <span className="text-xs truncate max-w-[180px]">{event?.name || 'Back'}</span>
            </button>
            <div className="flex items-center gap-1.5">
              <InfoButton onClick={onInfo} />
              <ThemeToggle />
              <button onClick={onExport} className="p-1.5 rounded-md bg-surface border border-line active:scale-95" aria-label="Export">
                <FileText className="w-3.5 h-3.5 text-3" />
              </button>
            </div>
          </div>

          <div className="bg-surface border border-line rounded-xl p-3 mb-3">
            {editHeader ? (
              <div className="space-y-2 fade-in">
                <div className="grid grid-cols-3 gap-1.5">
                  <SlimInput label="Wk" type="number" value={day.weekNum} onChange={v => update({ weekNum: parseInt(v)||0 })} />
                  <SlimInput label="Day" type="number" value={day.dayNum} onChange={v => update({ dayNum: parseInt(v)||0 })} />
                  <SlimInput label="Date" type="date" value={day.date} onChange={v => update({ date: v })} />
                </div>
                <button onClick={() => setEditHeader(false)} className="w-full bg-inverse font-semibold py-1.5 rounded-md text-xs flex items-center justify-center gap-1">
                  <Check className="w-3 h-3" strokeWidth={3} /> Done
                </button>
              </div>
            ) : (
              <div className="flex items-center justify-between gap-2">
                <button onClick={() => !isClosed && setEditHeader(true)} className="text-left flex-1 min-w-0">
                  <div className="flex items-center gap-1.5 mb-0.5 flex-wrap">
                    <span className={`text-[9px] uppercase tracking-widest font-data font-bold px-1.5 py-0.5 rounded ${isClosed ? 'bg-status-closed' : 'bg-accent-soft'}`}>
                      {isClosed ? '🔒 CLOSED' : '🟢 LIVE'}
                    </span>
                    <span className="text-[10px] text-3 font-data">{dateNice(day.date)}</span>
                    {event?.city && <DayWeather city={event.city} date={day.date} />}
                  </div>
                  <div className="font-display font-extrabold text-lg leading-tight text-1">
                    Week {day.weekNum} · Day {day.dayNum}
                  </div>
                </button>
                <div className="text-right">
                  <div className="text-[8px] uppercase tracking-widest text-4 font-data">Total Out</div>
                  <div className="font-data font-extrabold text-2xl text-amber leading-none">{dayTotal}</div>
                </div>
              </div>
            )}
          </div>

          <SectionLabel emoji="📦" title="Inventory" count={day.activeItems.length} />
          <InventoryGrid day={day} itemsLibrary={itemsLibrary} update={update} isClosed={isClosed} showToast={showToast} />

          <div className="mt-4">
            <SectionLabel emoji="📦" title="Warehouse Sync" />
            <SyncStatusCard day={day} stockMap={stockMap || {}} onOpenSync={() => setShowSyncModal(true)} onUndoSync={() => setShowUndoConfirm(true)} />
          </div>

          <div className="mt-6">
            {isClosed ? (
              <button onClick={reopenDay} className="w-full bg-surface border border-line text-1 font-semibold py-2.5 rounded-lg text-sm flex items-center justify-center gap-1.5 active:scale-[0.98]">
                <Unlock className="w-3.5 h-3.5" /> Reopen Day
              </button>
            ) : (
              <button onClick={() => setShowCloseConfirm(true)} className="w-full bg-danger-soft border border-danger text-danger font-semibold py-2.5 rounded-lg text-sm flex items-center justify-center gap-1.5 active:scale-[0.98]">
                <Lock className="w-3.5 h-3.5" /> Close Out Day
              </button>
            )}
          </div>

          {showSyncModal && (
            <SyncToWarehouseModal
              day={day}
              itemsLibrary={itemsLibrary}
              stockMap={stockMap || {}}
              onClose={() => setShowSyncModal(false)}
              onApply={async (mode, deductions) => {
                await onApplyStockSync(day, mode, deductions);
                setShowSyncModal(false);
                const total = Object.values(deductions).reduce((s, b) => s + (b || 0), 0);
                showToast(`📦 Synced · ${total} ${total === 1 ? 'box' : 'boxes'}`);
              }}
            />
          )}
          {showUndoConfirm && (
            <Modal onClose={() => setShowUndoConfirm(false)}>
              <div className="text-center">
                <div className="text-3xl mb-2">↩️</div>
                <h3 className="font-display text-lg font-bold mb-1 text-1">Undo this sync?</h3>
                <p className="text-3 text-xs mb-4">The deducted boxes will be added back to warehouse stock.</p>
                <div className="flex gap-2">
                  <button onClick={() => setShowUndoConfirm(false)} className="flex-1 bg-surface-2 text-2 font-semibold py-2 rounded-md text-sm border border-line">Cancel</button>
                  <button onClick={async () => { setShowUndoConfirm(false); await onUndoStockSync(day); showToast('↩️ Sync undone'); }} className="flex-1 bg-inverse font-bold py-2 rounded-md text-sm">Undo</button>
                </div>
              </div>
            </Modal>
          )}

          {showCloseConfirm && (
            <Modal onClose={() => setShowCloseConfirm(false)}>
              <div className="text-center">
                <div className="text-3xl mb-2">🔒</div>
                <h3 className="font-display text-lg font-bold mb-1 text-1">Close out this day?</h3>
                <p className="text-3 text-xs mb-4">Totals lock. Can be reopened later. 👌</p>
                <div className="flex gap-2">
                  <button onClick={() => setShowCloseConfirm(false)} className="flex-1 bg-surface-2 text-2 font-semibold py-2 rounded-md text-sm border border-line">Cancel</button>
                  <button onClick={closeDay} className="flex-1 bg-inverse font-bold py-2 rounded-md text-sm">Close Out</button>
                </div>
              </div>
            </Modal>
          )}
        </div>
      );
    }

    function SectionLabel({ emoji, title, count }) {
      return (
        <div className="flex items-center gap-1.5 mb-1.5 px-1">
          <span className="text-sm">{emoji}</span>
          <span className="text-[10px] uppercase tracking-[0.2em] font-data font-bold text-2">{title}</span>
          {count > 0 && <span className="text-[9px] font-data font-bold text-4">· {count}</span>}
        </div>
      );
    }
    function SlimInput({ label, value, onChange, type='text', placeholder='' }) {
      return (
        <label className="block">
          <span className="text-[8px] uppercase tracking-widest text-4 font-data font-bold">{label}</span>
          <input type={type} value={value ?? ''} onChange={e => onChange(e.target.value)} onFocus={e => type === 'number' && e.target.select()} placeholder={placeholder} className="input mt-0.5 w-full rounded-md px-2 py-1 text-xs font-data font-bold placeholder-mute" />
        </label>
      );
    }

    // === INVENTORY ===
    function InventoryGrid({ day, itemsLibrary, update, isClosed, showToast }) {
      const [showAdd, setShowAdd] = useState(false);
      const setItem = (n, p) => update({ inventory: { ...day.inventory, [n]: { ...day.inventory[n], ...p } } });
      const addRestock = (n, a) => {
        if (!a || a <= 0) return;
        const cur = day.inventory[n] || { starting: 0, restocks: [], leftover: null };
        setItem(n, { restocks: [...(cur.restocks || []), { amount: a, time: new Date().toISOString() }] });
        showToast(`+${a} ${n}`);
      };
      const removeRestock = (n, i) => setItem(n, { restocks: day.inventory[n].restocks.filter((_, idx) => idx !== i) });
      const addItem = (n) => {
        if (day.activeItems.includes(n)) return;
        update({ activeItems: [...day.activeItems, n], inventory: { ...day.inventory, [n]: { starting: 0, restocks: [], leftover: null } } });
        setShowAdd(false);
      };
      const removeItem = (n) => {
        const inv = { ...day.inventory }; delete inv[n];
        update({ activeItems: day.activeItems.filter(x => x !== n), inventory: inv });
      };
      const avail = itemsLibrary.filter(i => !day.activeItems.includes(i.name));

      return (
        <div className="space-y-1.5">
          {day.activeItems.length === 0 && (
            <div className="bg-surface border border-dashed border-line rounded-lg px-4 py-5 text-center">
              <p className="text-xs text-3 mb-2">No items in play</p>
              {!isClosed && <button onClick={() => setShowAdd(true)} className="text-accent text-xs font-bold">+ Pick items</button>}
            </div>
          )}
          {day.activeItems.map(name => (
            <CompactItem key={name} name={name} emoji={getEmoji(itemsLibrary, name)}
              data={day.inventory[name] || { starting: 0, restocks: [], leftover: null }}
              isClosed={isClosed}
              onUpdate={(p) => setItem(name, p)}
              onAddRestock={(a) => addRestock(name, a)}
              onRemoveRestock={(i) => removeRestock(name, i)}
              onRemove={() => removeItem(name)} />
          ))}
          {!isClosed && avail.length > 0 && (
            <button onClick={() => setShowAdd(true)} className="w-full bg-surface border border-dashed border-line text-3 py-2 rounded-lg text-xs font-semibold flex items-center justify-center gap-1 active:scale-[0.99]">
              <Plus className="w-3 h-3" /> Add item
            </button>
          )}
          {showAdd && (
            <Modal onClose={() => setShowAdd(false)}>
              <h3 className="font-display text-base font-bold mb-3 text-1">Add item to today</h3>
              {avail.length === 0 ? (
                <div className="text-center py-4 text-3 text-xs">All items added. Add new ones in Settings ⚙️</div>
              ) : (
                <div className="space-y-1">
                  {avail.map(i => (
                    <button key={i.name} onClick={() => addItem(i.name)} className="w-full text-left bg-surface-2 hover:opacity-80 rounded-md px-3 py-2 text-sm font-semibold flex items-center justify-between active:scale-[0.99] text-1 border border-line">
                      <span>{i.emoji} {i.name}</span>
                      <Plus className="w-3.5 h-3.5 text-accent" strokeWidth={3} />
                    </button>
                  ))}
                </div>
              )}
            </Modal>
          )}
        </div>
      );
    }

    function CompactItem({ name, emoji, data, isClosed, onUpdate, onAddRestock, onRemoveRestock, onRemove }) {
      const [restockInput, setRestockInput] = useState('');
      const [expanded, setExpanded] = useState(false);
      const [confirmRm, setConfirmRm] = useState(false);
      const restockTotal = (data.restocks || []).reduce((s, r) => s + (r.amount || 0), 0);
      const start = (data.starting || 0) + restockTotal;
      const lo = data.leftover;
      const has = lo !== null && lo !== undefined && lo !== '';
      const out = has ? Math.max(0, start - Number(lo)) : null;
      const submit = () => { const n = parseInt(restockInput); if (n && n > 0) { onAddRestock(n); setRestockInput(''); } };

      return (
        <div className="bg-surface border border-line rounded-lg overflow-hidden">
          <button onClick={() => setExpanded(!expanded)} type="button" className="w-full px-3 py-2 flex items-center gap-2 text-left active:opacity-80">
            <span className="text-base shrink-0">{emoji}</span>
            <div className="flex-1 min-w-0">
              <div className="flex items-center gap-1.5">
                <span className="font-display font-bold text-sm truncate text-1">{name}</span>
                {restockTotal > 0 && <span className="text-[9px] font-data font-bold bg-accent-soft px-1 py-px rounded">+{restockTotal}</span>}
              </div>
              <div className="text-[10px] font-data text-3 leading-tight">Total start: <b className="text-2">{start}</b></div>
            </div>
            <div className="text-right shrink-0">
              <div className="text-[8px] uppercase tracking-widest text-4 font-data leading-none">Out</div>
              <div className={`font-data font-extrabold text-xl leading-tight ${has ? 'text-amber' : 'text-5'}`}>{out ?? '—'}</div>
            </div>
            <ChevronRight className={`w-4 h-4 text-4 transition-transform shrink-0 ${expanded ? 'rotate-90' : ''}`} />
          </button>
          {expanded && (
            <div className="border-t border-line-soft px-3 py-2.5 bg-surface-2 fade-in">
              <div className="grid grid-cols-2 gap-1.5 mb-2">
                <label className="block">
                  <span className="text-[9px] uppercase tracking-widest text-3 font-data font-bold">Starting</span>
                  <input type="number" inputMode="numeric" value={data.starting || ''} onChange={e => onUpdate({ starting: parseInt(e.target.value) || 0 })} onFocus={e => e.target.select()} disabled={isClosed} placeholder="0" className="input-2 mt-0.5 w-full rounded-md px-2 py-1.5 text-base font-data font-bold disabled:opacity-60 placeholder-mute" />
                </label>
                <label className="block">
                  <span className="text-[9px] uppercase tracking-widest text-3 font-data font-bold">Leftover</span>
                  <input type="number" inputMode="numeric" value={lo === null || lo === undefined ? '' : lo} onChange={e => { const v = e.target.value; onUpdate({ leftover: v === '' ? null : parseInt(v) || 0 }); }} onFocus={e => e.target.select()} disabled={isClosed} placeholder="—" className="input-2 mt-0.5 w-full rounded-md px-2 py-1.5 text-base font-data font-bold disabled:opacity-60 placeholder-mute" />
                </label>
              </div>
              {!isClosed && (
                <div className="flex gap-1.5 mb-2">
                  <input type="number" inputMode="numeric" value={restockInput} onChange={e => setRestockInput(e.target.value)} onFocus={e => e.target.select()} onKeyDown={e => e.key === 'Enter' && submit()} placeholder="+ stock amount" className="input-2 flex-1 rounded-md px-2 py-1.5 text-xs font-data placeholder-mute" />
                  <button onClick={submit} className="px-3 bg-accent rounded-md font-bold text-xs active:scale-95">+ Stock</button>
                </div>
              )}
              {(data.restocks || []).length > 0 && (
                <div className="bg-surface border border-line rounded-md divide-line">
                  {data.restocks.map((r, i) => (
                    <div key={i} className="flex items-center justify-between px-2 py-1 text-[10px] font-data">
                      <span className="text-3 flex items-center gap-1"><Clock className="w-2.5 h-2.5" />{timeShort(r.time)}</span>
                      <span className="font-bold text-accent">+{r.amount}</span>
                      {!isClosed && <button onClick={() => onRemoveRestock(i)} className="text-4 hover:text-danger"><X className="w-2.5 h-2.5" /></button>}
                    </div>
                  ))}
                </div>
              )}
              {!isClosed && (
                <div className="mt-2 flex justify-end">
                  {confirmRm ? (
                    <div className="flex gap-1">
                      <button onClick={onRemove} className="px-2 py-0.5 bg-danger rounded text-[10px] font-bold">Remove item</button>
                      <button onClick={() => setConfirmRm(false)} className="p-0.5 text-4"><X className="w-3 h-3" /></button>
                    </div>
                  ) : (
                    <button onClick={() => setConfirmRm(true)} className="text-[10px] text-4 hover:text-danger flex items-center gap-0.5">
                      <Trash2 className="w-2.5 h-2.5" /> remove
                    </button>
                  )}
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    // === LIBRARY ===
    function StockScreen({ itemsLibrary, stockMap, onBack, onInfo, onChangeStock, onSetItemSettings, onUpdateHistory, showToast }) {
      const [restocking, setRestocking] = useState(null);
      const [usingItem, setUsingItem] = useState(null);
      const [setupItem, setSetupItem] = useState(null);

      const itemsWithStock = (itemsLibrary || []).map(item => ({
        ...item,
        stock: (stockMap || {})[item.name] || { boxes: 0, unitsPerBox: 1, threshold: 0, notes: '', history: [] }
      }));

      const isLow = (item) => item.stock.threshold > 0 && item.stock.boxes <= item.stock.threshold;
      const lowItems = itemsWithStock.filter(isLow);
      const okItems = itemsWithStock.filter(i => !isLow(i));

      const totalBoxes = itemsWithStock.reduce((s, i) => s + (i.stock.boxes || 0), 0);
      const totalUnits = itemsWithStock.reduce((s, i) => s + (i.stock.boxes || 0) * (i.stock.unitsPerBox || 1), 0);

      return (
        <div className="max-w-2xl mx-auto px-4 pt-4 pb-32">
          <div className="flex items-center justify-between mb-3">
            <button onClick={onBack} className="flex items-center gap-1 text-3 active:scale-95">
              <ChevronLeft className="w-4 h-4" /><span className="text-xs">Home</span>
            </button>
            <div className="flex items-center gap-1.5">
              <InfoButton onClick={onInfo} />
              <ThemeToggle />
            </div>
          </div>

          <div className="mb-4">
            <div className="text-[10px] font-data uppercase tracking-[0.25em] text-accent font-bold flex items-center gap-1">📦 Inventory</div>
            <h1 className="font-display text-2xl font-extrabold leading-tight text-1">Warehouse Stock</h1>
            <p className="text-3 text-xs mt-1">Track boxes on hand. Low-stock items get a ⚠️ badge.</p>
          </div>

          <div className="flex items-center gap-2 text-xs font-data mb-4 px-1 flex-wrap">
            <span><span className="text-4">Boxes</span> <b className="text-1">{totalBoxes}</b></span>
            <span className="text-5">·</span>
            <span><span className="text-4">Units</span> <b className="text-amber">{totalUnits.toLocaleString()}</b></span>
            {lowItems.length > 0 && (
              <>
                <span className="text-5">·</span>
                <span className="text-danger font-bold flex items-center gap-1"><AlertTriangle className="w-3 h-3" /> {lowItems.length} low</span>
              </>
            )}
          </div>

          {itemsWithStock.some(i => i.stock.boxes > 0) && (
            <div className="bg-surface border border-line rounded-xl p-3 mb-4">
              <div className="flex items-center justify-between gap-2 mb-2 pb-1.5 border-b border-line">
                <div className="text-[10px] font-data uppercase tracking-[0.25em] text-3 font-bold">📊 On Hand By Item</div>
                <div className="flex items-center gap-1.5 text-[9px] font-data text-3 uppercase tracking-widest font-bold">
                  <span>Boxes</span>
                  <span className="text-5">/</span>
                  <span>Units</span>
                </div>
              </div>
              <div className="space-y-1">
                {itemsWithStock.filter(i => i.stock.boxes > 0).map(item => {
                  const u = item.stock.boxes * (item.stock.unitsPerBox || 1);
                  return (
                    <div key={item.name} className="flex items-center gap-2 text-xs font-data">
                      <span className="text-base shrink-0">{item.emoji}</span>
                      <span className="flex-1 truncate text-2">{item.name}</span>
                      <span className="font-bold text-1 tabular-nums">{item.stock.boxes}</span>
                      <span className="text-5">/</span>
                      <span className="font-bold text-amber tabular-nums">{u.toLocaleString()}</span>
                    </div>
                  );
                })}
                <div className="flex items-center gap-2 text-xs font-data pt-1.5 mt-1.5 border-t border-line">
                  <span className="text-base shrink-0">📦</span>
                  <span className="flex-1 font-display font-extrabold text-1">Total</span>
                  <span className="font-extrabold text-1 tabular-nums">{totalBoxes}</span>
                  <span className="text-5">/</span>
                  <span className="font-extrabold text-amber tabular-nums">{totalUnits.toLocaleString()}</span>
                </div>
              </div>
            </div>
          )}

          {itemsLibrary.length === 0 ? (
            <div className="text-center py-12 border border-dashed border-line rounded-xl">
              <div className="text-3xl mb-1">📦</div>
              <p className="text-sm text-3">No items in your library yet.</p>
              <p className="text-xs text-4 mt-2">Add items in <b className="text-accent">Settings → Library</b> first.</p>
            </div>
          ) : (
            <>
              {lowItems.length > 0 && (
                <>
                  <div className="text-[10px] font-data uppercase tracking-[0.25em] text-danger font-bold mb-2 px-1 flex items-center gap-1">
                    <AlertTriangle className="w-3 h-3" /> Low Stock
                  </div>
                  <div className="space-y-2 mb-4">
                    {lowItems.map(item => (
                      <StockItemCard
                        key={item.name}
                        item={item}
                        isLow={true}
                        onDelta={(d) => onChangeStock(item.name, d > 0 ? 'adjust-add' : 'adjust-sub', Math.abs(d))}
                        onRestock={() => setRestocking(item)}
                        onUse={() => setUsingItem(item)}
                        onSetup={() => setSetupItem(item)}
                      />
                    ))}
                  </div>
                </>
              )}

              {okItems.length > 0 && (
                <>
                  <div className="text-[10px] font-data uppercase tracking-[0.25em] text-3 font-bold mb-2 px-1">
                    {lowItems.length > 0 ? 'All Other Items' : 'Items'}
                  </div>
                  <div className="space-y-2">
                    {okItems.map(item => (
                      <StockItemCard
                        key={item.name}
                        item={item}
                        isLow={false}
                        onDelta={(d) => onChangeStock(item.name, d > 0 ? 'adjust-add' : 'adjust-sub', Math.abs(d))}
                        onRestock={() => setRestocking(item)}
                        onUse={() => setUsingItem(item)}
                        onSetup={() => setSetupItem(item)}
                      />
                    ))}
                  </div>
                </>
              )}
            </>
          )}

          {restocking && (
            <StockChangeModal
              mode="restock"
              item={restocking}
              onClose={() => setRestocking(null)}
              onSave={(boxes, note) => { onChangeStock(restocking.name, 'restock', boxes, note); setRestocking(null); showToast(`📥 +${boxes} ${restocking.name}`); }}
            />
          )}
          {usingItem && (
            <StockChangeModal
              mode="use"
              item={usingItem}
              onClose={() => setUsingItem(null)}
              onSave={(boxes, note) => { onChangeStock(usingItem.name, 'use', boxes, note); setUsingItem(null); showToast(`📤 -${boxes} ${usingItem.name}`); }}
            />
          )}
          {setupItem && (
            <StockSetupModal
              item={{ ...setupItem, stock: (stockMap || {})[setupItem.name] || setupItem.stock }}
              onClose={() => setSetupItem(null)}
              onSave={(unitsPerBox, threshold, notes) => { onSetItemSettings(setupItem.name, { unitsPerBox, threshold, notes }); setSetupItem(null); showToast(`⚙️ Updated ${setupItem.name}`); }}
              onUpdateHistory={(newHist) => onUpdateHistory(setupItem.name, newHist)}
              showToast={showToast}
            />
          )}
        </div>
      );
    }

    function StockItemCard({ item, isLow, onDelta, onRestock, onUse, onSetup }) {
      const { stock } = item;
      const units = (stock.boxes || 0) * (stock.unitsPerBox || 1);
      const lastDate = stock.lastRestockedAt ? (() => { try { return new Date(stock.lastRestockedAt).toLocaleDateString([], { month: 'short', day: 'numeric' }); } catch { return null; } })() : null;
      return (
        <div className={`bg-surface rounded-xl p-3 border ${isLow ? 'border-danger' : 'border-line'}`}>
          <div className="flex items-center gap-2 mb-2">
            <span className="text-2xl shrink-0">{item.emoji}</span>
            <div className="flex-1 min-w-0">
              <div className="font-display font-extrabold text-base text-1 truncate">{item.name}</div>
              <div className="text-[10px] text-3 font-data flex items-center gap-1 flex-wrap">
                <span>{(stock.unitsPerBox || 1)}/box</span>
                {stock.threshold > 0 && <><span className="text-5">·</span><span>low ≤ {stock.threshold}</span></>}
                {lastDate && <><span className="text-5">·</span><span>last {lastDate}</span></>}
              </div>
            </div>
            <button onClick={onSetup} className="p-1.5 text-4 hover:text-accent active:scale-90" aria-label="Settings">
              <Settings className="w-4 h-4" />
            </button>
          </div>

          <div className="flex items-center gap-2 mb-2">
            <button onClick={() => onDelta(-1)} disabled={stock.boxes === 0} className="w-12 h-12 rounded-lg bg-surface-2 border border-line text-1 active:scale-95 disabled:opacity-30 flex items-center justify-center">
              <Minus className="w-5 h-5" strokeWidth={3} />
            </button>
            <div className="flex-1 text-center bg-surface-2 border border-line rounded-lg py-1.5">
              <div className="font-display text-3xl font-extrabold leading-none text-1">{stock.boxes || 0}</div>
              <div className="text-[9px] text-3 font-data uppercase tracking-wider leading-tight mt-0.5">
                {stock.boxes === 1 ? 'box' : 'boxes'} · {units.toLocaleString()} units
              </div>
            </div>
            <button onClick={() => onDelta(1)} className="w-12 h-12 rounded-lg bg-accent-soft border border-accent text-1 active:scale-95 flex items-center justify-center">
              <Plus className="w-5 h-5" strokeWidth={3} />
            </button>
          </div>

          {isLow && (
            <div className="bg-danger-soft border border-danger text-danger rounded-md px-2 py-1 text-[10px] font-data font-bold mb-2 flex items-center gap-1">
              <AlertTriangle className="w-3 h-3" /> Reorder soon
            </div>
          )}

          {stock.notes && (
            <div className="text-[10px] text-3 font-data bg-surface-2 rounded-md px-2 py-1 mb-2 italic">📝 {stock.notes}</div>
          )}

          <div className="grid grid-cols-2 gap-2">
            <button onClick={onRestock} className="bg-surface-2 border border-line rounded-md py-2 text-xs font-semibold text-1 active:scale-95 flex items-center justify-center gap-1.5">
              📥 Restock
            </button>
            <button onClick={onUse} disabled={stock.boxes === 0} className="bg-surface-2 border border-line rounded-md py-2 text-xs font-semibold text-1 active:scale-95 disabled:opacity-40 flex items-center justify-center gap-1.5">
              📤 Use
            </button>
          </div>
        </div>
      );
    }

    function StockChangeModal({ mode, item, onClose, onSave }) {
      const [amount, setAmount] = useState('');
      const [note, setNote] = useState('');
      const isRestock = mode === 'restock';
      const n = parseInt(amount) || 0;
      const valid = n > 0 && (isRestock || n <= (item.stock.boxes || 0));
      const submit = () => { if (valid) onSave(n, note.trim() || null); };
      return (
        <Modal onClose={onClose}>
          <h3 className="font-display text-lg font-bold mb-1 text-1">
            {isRestock ? '📥 Restock' : '📤 Use'} {item.emoji} {item.name}
          </h3>
          <p className="text-xs text-3 mb-3 font-data">
            Currently <b className="text-1">{item.stock.boxes || 0}</b> {(item.stock.boxes === 1) ? 'box' : 'boxes'} on hand.
          </p>
          <div className="space-y-2 mb-3">
            <label className="block">
              <span className="text-[10px] uppercase tracking-widest text-3 font-data font-bold">{isRestock ? 'Boxes received' : 'Boxes used'}</span>
              <input type="number" inputMode="numeric" value={amount} onChange={e => setAmount(e.target.value)} onFocus={e => e.target.select()} onKeyDown={e => e.key === 'Enter' && submit()} autoFocus placeholder="0" className="input mt-0.5 w-full rounded-md px-3 py-2 text-base font-data font-bold placeholder-mute" />
              {!isRestock && n > (item.stock.boxes || 0) && (
                <div className="text-[10px] text-danger font-data mt-1">⚠️ More than on hand — limit is {item.stock.boxes || 0}.</div>
              )}
            </label>
            <label className="block">
              <span className="text-[10px] uppercase tracking-widest text-3 font-data font-bold">Note <span className="text-4 normal-case tracking-normal">(optional)</span></span>
              <input value={note} onChange={e => setNote(e.target.value)} onKeyDown={e => e.key === 'Enter' && submit()} placeholder={isRestock ? "e.g. Order #1234, shipment from HQ" : "e.g. Damaged box, recount"} className="input mt-0.5 w-full rounded-md px-3 py-2 text-sm placeholder-mute" />
            </label>
          </div>
          <div className="flex gap-2">
            <button onClick={onClose} className="flex-1 bg-surface-2 border border-line text-2 font-semibold py-2 rounded-md text-sm">Cancel</button>
            <button onClick={submit} disabled={!valid} className="flex-1 bg-inverse font-bold py-2 rounded-md text-sm disabled:opacity-40">
              {isRestock ? `📥 Add ${n || ''}` : `📤 Remove ${n || ''}`}
            </button>
          </div>
        </Modal>
      );

    function StockSetupModal({ item, onClose, onSave, onUpdateHistory, showToast }) {
      const [tab, setTab] = useState('settings');
      const [unitsPerBox, setUnitsPerBox] = useState(item.stock.unitsPerBox || 1);
      const [threshold, setThreshold] = useState(item.stock.threshold || 0);
      const [notes, setNotes] = useState(item.stock.notes || '');
      const [confirmDelete, setConfirmDelete] = useState(null);
      const [undoStack, setUndoStack] = useState([]);
      const history = item.stock.history || [];
      const submit = () => {
        const upb = Math.max(1, parseInt(unitsPerBox) || 1);
        const thr = Math.max(0, parseInt(threshold) || 0);
        onSave(upb, thr, notes.trim());
      };

      const doDeleteOne = (index) => {
        const entry = history[index];
        const newHistory = history.filter((_, i) => i !== index);
        setUndoStack([...undoStack, [{ entry, index }]]);
        onUpdateHistory(newHistory);
        setConfirmDelete(null);
        showToast && showToast('🗑️ Entry deleted · Undo available');
      };
      const doDeleteAll = () => {
        if (history.length === 0) return;
        const saved = history.map((entry, index) => ({ entry, index }));
        setUndoStack([...undoStack, saved]);
        onUpdateHistory([]);
        setConfirmDelete(null);
        showToast && showToast(`🗑️ Cleared ${saved.length} · Undo available`);
      };
      const doUndo = () => {
        if (undoStack.length === 0) return;
        const last = undoStack[undoStack.length - 1];
        const restored = [...history];
        const sorted = [...last].sort((a, b) => a.index - b.index);
        for (const { entry, index } of sorted) {
          restored.splice(Math.min(index, restored.length), 0, entry);
        }
        setUndoStack(undoStack.slice(0, -1));
        onUpdateHistory(restored);
        showToast && showToast('↩️ Restored');
      };

      const labelForType = (t) => {
        if (t === 'restock') return { e: '📥', txt: 'Restocked', color: 'text-accent' };
        if (t === 'use') return { e: '📤', txt: 'Used', color: 'text-amber' };
        if (t === 'auto-deduct') return { e: '🤖', txt: 'Day sync', color: 'text-amber' };
        if (t === 'sync-undo') return { e: '↩️', txt: 'Sync undone', color: 'text-accent' };
        if (t === 'adjust-add') return { e: '➕', txt: 'Adjusted +', color: 'text-2' };
        if (t === 'adjust-sub') return { e: '➖', txt: 'Adjusted −', color: 'text-2' };
        return { e: '✏️', txt: 'Changed', color: 'text-2' };
      };
      const formatTs = (ts) => {
        try {
          const d = new Date(ts);
          const date = d.toLocaleDateString([], { month: 'short', day: 'numeric', year: 'numeric' });
          const time = d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
          return `${date} · ${time}`;
        } catch { return ts; }
      };
      return (
        <Modal onClose={onClose}>
          <h3 className="font-display text-lg font-bold mb-2 text-1">
            ⚙️ Set up {item.emoji} {item.name}
          </h3>
          <div className="flex gap-1 mb-3 bg-surface-2 border border-line rounded-lg p-1">
            <button onClick={() => setTab('settings')} className={`flex-1 py-1.5 rounded-md text-xs font-display font-bold transition ${tab === 'settings' ? 'bg-accent-soft text-1 border border-accent' : 'text-3'}`}>
              ⚙️ Settings
            </button>
            <button onClick={() => setTab('history')} className={`flex-1 py-1.5 rounded-md text-xs font-display font-bold transition ${tab === 'history' ? 'bg-accent-soft text-1 border border-accent' : 'text-3'}`}>
              📋 History {history.length > 0 && <span className="text-[9px] font-data ml-1 text-4">({history.length})</span>}
            </button>
          </div>

          {tab === 'settings' && (
            <>
              <div className="space-y-2 mb-3">
                <label className="block">
                  <span className="text-[10px] uppercase tracking-widest text-3 font-data font-bold">Units per box</span>
                  <input type="number" inputMode="numeric" value={unitsPerBox} onChange={e => setUnitsPerBox(e.target.value)} onFocus={e => e.target.select()} placeholder="1" className="input mt-0.5 w-full rounded-md px-3 py-2 text-base font-data font-bold placeholder-mute" />
                  <div className="text-[10px] text-3 font-data mt-1">e.g. 50 T-shirts per box. Use <b>1</b> if you track loose units.</div>
                </label>
                <label className="block">
                  <span className="text-[10px] uppercase tracking-widest text-3 font-data font-bold">Low-stock threshold</span>
                  <input type="number" inputMode="numeric" value={threshold} onChange={e => setThreshold(e.target.value)} onFocus={e => e.target.select()} placeholder="0" className="input mt-0.5 w-full rounded-md px-3 py-2 text-base font-data font-bold placeholder-mute" />
                  <div className="text-[10px] text-3 font-data mt-1">Warn when boxes ≤ this number. Set <b>0</b> to disable warnings.</div>
                </label>
                <label className="block">
                  <span className="text-[10px] uppercase tracking-widest text-3 font-data font-bold">Notes <span className="text-4 normal-case tracking-normal">(optional)</span></span>
                  <textarea value={notes} onChange={e => setNotes(e.target.value)} placeholder="e.g. Big & Tall sizes stored in main warehouse" rows={2} className="input mt-0.5 w-full rounded-md px-3 py-2 text-sm placeholder-mute resize-none" />
                </label>
              </div>
              <div className="flex gap-2">
                <button onClick={onClose} className="flex-1 bg-surface-2 border border-line text-2 font-semibold py-2 rounded-md text-sm">Cancel</button>
                <button onClick={submit} className="flex-1 bg-inverse font-bold py-2 rounded-md text-sm">Save</button>
              </div>
            </>
          )}

          {tab === 'history' && (
            <>
              {(undoStack.length > 0 || history.length > 0) && (
                <div className="flex items-center gap-2 mb-2">
                  {undoStack.length > 0 && (
                    <button onClick={doUndo} className="flex-1 bg-accent-soft border border-accent text-1 font-bold py-1.5 rounded-md text-xs flex items-center justify-center gap-1.5 active:scale-[0.98]">
                      ↩️ Undo last delete
                    </button>
                  )}
                  {history.length > 0 && (
                    <button onClick={() => setConfirmDelete({ kind: 'all' })} className="flex-1 bg-surface-2 border border-line text-3 font-semibold py-1.5 rounded-md text-xs flex items-center justify-center gap-1.5 active:scale-[0.98]">
                      🗑️ Clear all
                    </button>
                  )}
                </div>
              )}

              <div className="max-h-[50vh] overflow-y-auto -mx-1 px-1">
                {history.length === 0 ? (
                  <div className="text-center py-8 text-3 text-xs">
                    <div className="text-3xl mb-2">📋</div>
                    <p>{undoStack.length > 0 ? 'All entries cleared.' : 'No history yet.'}</p>
                    <p className="text-4 mt-1 text-[10px]">{undoStack.length > 0 ? 'Tap Undo above to restore.' : 'Restocks, uses, and adjustments appear here.'}</p>
                  </div>
                ) : (
                  <div className="space-y-1.5">
                    {history.map((h, i) => {
                      const meta = labelForType(h.type);
                      return (
                        <div key={`${h.ts}-${i}`} className="bg-surface-2 border border-line rounded-lg p-2.5 flex items-start gap-2">
                          <span className="text-lg shrink-0">{meta.e}</span>
                          <div className="flex-1 min-w-0">
                            <div className="flex items-center gap-1.5 flex-wrap">
                              <span className={`font-display font-bold text-xs ${meta.color}`}>{meta.txt}</span>
                              <span className="font-data font-extrabold text-sm text-1">
                                {(h.type === 'use' || h.type === 'auto-deduct' || h.type === 'adjust-sub') ? '−' : '+'}{h.boxes} box{h.boxes !== 1 ? 'es' : ''}
                              </span>
                            </div>
                            <div className="text-[10px] text-3 font-data">{formatTs(h.ts)}</div>
                            {h.note && <div className="text-[11px] text-2 italic mt-0.5">📝 {h.note}</div>}
                          </div>
                          <button onClick={() => setConfirmDelete({ kind: 'one', index: i })} className="shrink-0 w-7 h-7 rounded-md bg-surface border border-line text-4 active:scale-95 flex items-center justify-center" aria-label="Delete entry">
                            <Trash2 className="w-3 h-3" />
                          </button>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
              <button onClick={onClose} className="w-full mt-3 bg-inverse font-bold py-2 rounded-md text-sm">Done</button>

              {confirmDelete && (
                <Modal onClose={() => setConfirmDelete(null)}>
                  <div className="text-center">
                    <div className="text-3xl mb-2">🗑️</div>
                    <h3 className="font-display text-lg font-bold mb-1 text-1">
                      {confirmDelete.kind === 'all' ? `Clear all ${history.length} entries?` : 'Delete this entry?'}
                    </h3>
                    <p className="text-3 text-xs mb-4">
                      {confirmDelete.kind === 'all'
                        ? 'All history will be removed. You can still tap Undo right after.'
                        : 'Removes this one entry. You can still tap Undo right after.'}
                    </p>
                    <div className="flex gap-2">
                      <button onClick={() => setConfirmDelete(null)} className="flex-1 bg-surface-2 border border-line text-2 font-semibold py-2 rounded-md text-sm">Cancel</button>
                      <button onClick={() => confirmDelete.kind === 'all' ? doDeleteAll() : doDeleteOne(confirmDelete.index)} className="flex-1 bg-danger-soft border border-danger text-danger font-bold py-2 rounded-md text-sm">
                        {confirmDelete.kind === 'all' ? '🗑️ Clear All' : '🗑️ Delete'}
                      </button>
                    </div>
                  </div>
                </Modal>
              )}
            </>
          )}
        </Modal>
      );
    }

    // === SYNC STATUS CARD (on Day Detail) ===

      const trackedItems = (day.activeItems || []).filter(name => stockMap[name]);

          <div className="text-center mb-3">

          <div className="space-y-3 text-xs text-2 max-h-[60vh] overflow-y-auto -mx-1 px-1">

            <div className="bg-surface-2 border border-line rounded-lg p-2.5">

            <div className="bg-surface-2 border border-line rounded-lg p-2.5">

    function SyncToWarehouseModal({ day, itemsLibrary, stockMap, onClose, onApply }) {
      const trackedItems = (day.activeItems || []).filter(name => stockMap[name]);
      const untrackedItems = (day.activeItems || []).filter(name => !stockMap[name]);

      const buildInitial = (m) => {
        const result = {};
        for (const name of trackedItems) {
          const stock = stockMap[name];
          result[name] = calcSuggestedDeduction(day.inventory[name], stock.unitsPerBox || 1, m);
        }
        return result;
      };

      const [mode, setMode] = useState(day.stockSync?.mode || 'given_out');
      const [deductions, setDeductions] = useState(() => buildInitial(day.stockSync?.mode || 'given_out'));
      const [showHelp, setShowHelp] = useState(false);

      const switchMode = (m) => {
        setMode(m);
        setDeductions(buildInitial(m));
      };
      const updateDed = (name, val) => {
        const num = Math.max(0, parseInt(val) || 0);
        setDeductions(d => ({ ...d, [name]: num }));
      };
      const bump = (name, delta) => {
        const cur = deductions[name] || 0;
        updateDed(name, cur + delta);
      };

      const totalBoxes = Object.values(deductions).reduce((s, b) => s + (b || 0), 0);
      const isCustom = mode === 'custom';

      const MODE_OPTIONS = [
        { id: 'given_out', label: 'Given Out', emoji: '📤' },
        { id: 'pulled', label: 'Pulled', emoji: '📥' },
        { id: 'custom', label: 'Custom', emoji: '✏️' },
      ];

      if (showHelp) {
        return <SyncHelpModal onClose={() => setShowHelp(false)} />;
      }

      return (
        <Modal onClose={onClose}>
          <div className="flex items-start justify-between gap-2 mb-0.5">
            <h3 className="font-display text-lg font-bold text-1">📦 Sync to Warehouse</h3>
            <button onClick={() => setShowHelp(true)} className="shrink-0 w-7 h-7 rounded-md bg-surface-2 border border-line text-3 active:scale-95 flex items-center justify-center text-xs font-bold" aria-label="How does this work?">
              ⓘ
            </button>
          </div>
          <p className="text-xs text-3 mb-3 font-data">Day {day.dayNum} · {dateNice(day.date)}</p>

          <div className="mb-3">
            <div className="text-[10px] uppercase tracking-widest text-3 font-data font-bold mb-1.5">Calculate based on</div>
            <div className="flex gap-1 bg-surface-2 border border-line rounded-lg p-1">
              {MODE_OPTIONS.map(opt => (
                <button key={opt.id} onClick={() => switchMode(opt.id)} className={`flex-1 py-1.5 rounded-md text-[11px] font-display font-bold transition ${mode === opt.id ? 'bg-accent-soft text-1 border border-accent' : 'text-3 border border-transparent'}`}>
                  {opt.emoji} {opt.label}
                </button>
              ))}
            </div>
            <p className="text-[10px] text-4 font-data mt-1.5 px-1">
              {mode === 'given_out' && '🤖 Auto: Starting + Restocks − Leftover, rounded down to full boxes'}
              {mode === 'pulled' && '🤖 Auto: Starting + Restocks (everything you took), rounded down to full boxes'}
              {mode === 'custom' && '✏️ Manual entry — adjust each item below'}
            </p>
          </div>

          <div className="max-h-[40vh] overflow-y-auto -mx-1 px-1 space-y-1.5 mb-3">
            {trackedItems.length === 0 ? (
              <div className="text-center py-6 text-3 text-xs">
                <div className="text-2xl mb-2">📦</div>
                <p>No tracked items on this day.</p>
              </div>
            ) : trackedItems.map(name => {
              const inv = day.inventory[name] || {};
              const stock = stockMap[name];
              const upb = stock.unitsPerBox || 1;
              const starting = inv.starting || 0;
              const restocks = (inv.restocks || []).reduce((s, r) => s + (r.amount || 0), 0);
              const leftover = inv.leftover;
              const givenOut = (leftover === null || leftover === undefined) ? null : Math.max(0, starting + restocks - leftover);
              const pulled = starting + restocks;
              const emoji = getEmoji(itemsLibrary, name);
              const dedVal = deductions[name] || 0;
              const dedUnits = dedVal * upb;
              const afterBoxes = Math.max(0, stock.boxes - dedVal);
              const noChange = dedVal === 0;

              return (
                <div key={name} className="bg-surface-2 border border-line rounded-lg p-2.5">
                  <div className="flex items-center justify-between mb-1">
                    <div className="flex items-center gap-1.5 min-w-0">
                      <span className="text-base shrink-0">{emoji}</span>
                      <span className="font-display font-bold text-sm text-1 truncate">{name}</span>
                    </div>
                    <div className="text-[10px] text-4 font-data shrink-0">
                      📦 {stock.boxes} on hand
                    </div>
                  </div>

                  <div className="text-[10px] text-3 font-data mb-2 leading-snug">
                    {mode === 'given_out' && (
                      <>Start <b className="text-1">{starting}</b> + Restocks <b className="text-1">{restocks}</b> − Left <b className="text-1">{leftover ?? '—'}</b> = Given <b className="text-amber">{givenOut ?? '—'}</b> · {upb}/box</>
                    )}
                    {mode === 'pulled' && (
                      <>Start <b className="text-1">{starting}</b> + Restocks <b className="text-1">{restocks}</b> = Pulled <b className="text-amber">{pulled}</b> · {upb}/box</>
                    )}
                    {mode === 'custom' && (
                      <>Reference: Given <b className="text-1">{givenOut ?? '—'}</b> · Pulled <b className="text-1">{pulled}</b> · {upb}/box</>
                    )}

                  {isCustom ? (

                      <span className="text-[10px] text-3 font-data shrink-0 uppercase tracking-widest font-bold">Deduct</span>
                      <button onClick={() => bump(name, -1)} className="w-7 h-7 bg-surface border border-line rounded-md font-bold text-1 active:scale-95">−</button>

              {mode === 'given_out' && !trackedItems.some(n => day.inventory[n]?.leftover == null) && ' Round-down means only full boxes count. '}

      const [selectedExportIds, setSelectedExportIds] = useState(() => new Set());
      const fileRef = useRef(null);

      const sanitize = (s) => (s || 'export').replace(/[^a-z0-9]+/gi, '-').replace(/^-+|-+$/g, '').toLowerCase() || 'export';

      const openExportChooser = () => { setSelectedExportIds(new Set()); setExportChooser(true); };
      const closeExportChooser = () => { setExportChooser(false); setSelectedExportIds(new Set()); };

      const toggleExportSelected = (id) => {
        setSelectedExportIds(prev => {
          const next = new Set(prev);
          if (next.has(id)) next.delete(id); else next.add(id);
          return next;
        });
      };

      const handleExport = async (eventIds) => {
        try {
          const data = await onExport(eventIds);
          const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          const stamp = new Date().toISOString().split('T')[0];
          let tag = '';
          let toastMsg = '📥 Full backup downloaded';
          if (eventIds && eventIds.length === 1) {
            const ev = events?.find(e => e.id === eventIds[0]);
            if (ev) { tag = `-${sanitize(ev.name)}`; toastMsg = `📥 Exported "${ev.name}"`; }
          } else if (eventIds && eventIds.length > 1) {
            tag = `-${eventIds.length}-events`;
            toastMsg = `📥 Exported ${eventIds.length} events`;
          }
          a.download = `premium-backup${tag}-${stamp}.json`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
